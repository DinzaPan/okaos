<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKAOs - Rhythm Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        :root {
            --bg: #020205;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
            --k1: #ff4757;
            --k2: #3742fa;
            --k3: #2ed573;
            --k4: #eab000;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            width: 100vw;
            background: var(--bg);
            color: white;
            overflow: hidden;
            display: flex;
        }

        #pc-brand {
            position: fixed;
            top: 25px;
            left: 30px;
            font-size: 1.8rem;
            font-weight: 700;
            z-index: 1000;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: none;
        }

        @media (min-width: 1025px) {
            #pc-brand { display: block; }
        }

        #main-menu {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            background: radial-gradient(circle at 50% 50%, #0f0f1a 0%, #020205 100%);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s;
        }

        .sidebar {
            width: 400px;
            height: 100%;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--border);
        }

        @media (min-width: 1025px) {
            #main-menu {
                flex-direction: row-reverse;
            }
            .sidebar {
                border-right: none;
                border-left: 1px solid var(--border);
            }
        }

        .logo-main {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #fff 0%, #777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            border-radius: 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            color: #aaa;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s;
            text-decoration: none;
        }

        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }

        .nav-item:hover, .nav-item.active {
            background: var(--accent);
            color: #000;
            transform: translateX(10px);
        }

        #song-selection {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 150;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .song-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 600px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .song-list::-webkit-scrollbar { width: 6px; }
        .song-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .song-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            position: relative;
        }

        .mission-icon {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #eab000;
            color: black;
            padding: 4px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(234, 176, 0, 0.4);
        }

        .mission-icon svg {
            width: 16px;
            height: 16px;
            fill: black;
        }

        .song-card:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.02);
            border-color: #fff;
        }

        .song-info h3 { font-size: 1.2rem; margin-bottom: 5px; }
        .song-info p { color: #888; font-size: 0.85rem; }
        .song-info .best-score { font-size: 0.75rem; color: #2ed573; margin-top: 4px; display: block; }
        .song-card.completed { border-left: 5px solid #2ed573; }
        .diff-tag { font-size: 0.7rem; background: #ff4757; color: white; padding: 2px 8px; border-radius: 5px; margin-left: 10px; vertical-align: middle; }
        .hard-tag { background: #6c5ce7; }
        .boost-tag { background: #00d2ff; }
        .death-tag { background: #000; border: 1px solid #ff0000; color: #ff0000; }

        #settings-panel {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .settings-card {
            background: #111;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 500px;
        }

        .settings-title { font-size: 2rem; font-weight: 700; margin-bottom: 30px; text-align: center; }

        .setting-group { margin-bottom: 25px; }

        .setting-label { display: block; margin-bottom: 10px; color: #888; font-weight: 600; }

        .key-config { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

        .key-input {
            background: var(--glass);
            border: 2px solid var(--border);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
        }

        #k0 { border-color: var(--k1); }
        #k1 { border-color: var(--k2); }
        #k2 { border-color: var(--k3); }
        #k3 { border-color: var(--k4); }

        .key-input.waiting { border-color: #fff; background: rgba(255,255,255,0.1); box-shadow: 0 0 15px #fff; }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 5px;
            appearance: none;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .settings-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }

        .btn-s { padding: 15px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }

        .btn-save { background: #fff; color: #000; }
        .btn-cancel { background: var(--glass); color: #fff; border: 1px solid var(--border); }

        #intro-layer {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .intro-hearts { display: flex; gap: 20px; margin-bottom: 30px; }

        .intro-heart {
            width: 60px;
            height: 60px;
            fill: #ff4757;
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .intro-text {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        #game-canvas {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at center, #0a0a15 0%, #000 100%);
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s;
        }

        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            z-index: 60;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            transition: width 0.1s linear;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 50;
        }

        .lives-container { display: flex; gap: 8px; }

        .life-heart { width: 30px; height: 30px; fill: #ff4757; transition: opacity 0.3s, transform 0.3s; }

        .pause-trigger {
            width: 45px;
            height: 45px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .pause-trigger svg { width: 24px; height: 24px; fill: white; }

        .game-track {
            position: relative;
            width: 450px;
            height: 100%;
            background: rgba(255,255,255,0.01);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .hit-bar {
            position: absolute;
            bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 0 15px;
        }

        .slot {
            width: 75px;
            height: 75px;
            border: 3px solid var(--border);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.03);
            transition: all 0.05s;
            pointer-events: auto;
        }

        #s0 { border-color: rgba(255, 71, 87, 0.3); }
        #s1 { border-color: rgba(55, 66, 250, 0.3); }
        #s2 { border-color: rgba(46, 213, 115, 0.3); }
        #s3 { border-color: rgba(234, 176, 0, 0.3); }

        #s0.pressed { background: var(--k1) !important; box-shadow: 0 0 20px var(--k1); border-color: #fff; }
        #s1.pressed { background: var(--k2) !important; box-shadow: 0 0 20px var(--k2); border-color: #fff; }
        #s2.pressed { background: var(--k3) !important; box-shadow: 0 0 20px var(--k3); border-color: #fff; }
        #s3.pressed { background: var(--k4) !important; box-shadow: 0 0 20px var(--k4); border-color: #fff; }

        .slot svg { width: 32px; height: 32px; fill: rgba(255,255,255,0.2); pointer-events: none; }

        .note {
            position: absolute;
            width: 65px;
            height: 65px;
            background: #fff;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 10;
        }

        .note[data-lane="0"] { border: 3px solid var(--k1); }
        .note[data-lane="1"] { border: 3px solid var(--k2); }
        .note[data-lane="2"] { border: 3px solid var(--k3); }
        .note[data-lane="3"] { border: 3px solid var(--k4); }

        .note svg { width: 35px; height: 35px; fill: #000; }

        .ui-container {
            position: absolute;
            top: 25%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        #combo-text { font-size: 4rem; font-weight: 700; color: rgba(255,255,255,0.1); }

        #status-text { font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 5px; opacity: 0; }

        #overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .overlay-menu { width: 320px; display: flex; flex-direction: column; gap: 12px; }

        .overlay-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 30px; text-align: center; }

        .results-panel {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            text-align: center;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .res-item span { display: block; font-size: 0.8rem; color: #888; }
        .res-item b { font-size: 1.4rem; }
        
        .grade-display {
            font-size: 4.5rem;
            font-weight: 700;
            margin: 10px 0;
            text-shadow: 0 0 20px currentColor;
        }

        @keyframes noteFall {
            from { transform: translateY(-100px); }
            to { transform: translateY(calc(100vh + 100px)); }
        }

        @media (max-width: 900px) {
            .sidebar { width: 100%; height: 100%; border: none; padding: 40px; background: transparent; }
            .game-track { width: 100%; border: none; }
            .slot { width: 22vw; height: 22vw; }
            .note { width: 18vw; height: 18vw; }
        }
    </style>
</head>
<body>

    <div id="pc-brand">OKAOs</div>

    <audio id="game-audio" preload="auto" crossorigin="anonymous"></audio>

    <div id="main-menu">
        <div class="sidebar">
            <h1 class="logo-main">OKAOs</h1>
            <div class="nav-menu">
                <div class="nav-item active" onclick="showSongSelection()">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
                <a href="sc/misiones.html" class="nav-item">
                    <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg> Misiones
                </a>
                <div class="nav-item">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg> Perfil
                </div>
                <div class="nav-item" onclick="openSettings()">
                    <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg> Ajustes
                </div>
            </div>
        </div>
    </div>

    <div id="song-selection">
        <h2 class="settings-title">Selecciona una Canción</h2>
        <div class="song-list" id="main-song-list"></div>
        <button class="btn-s btn-cancel" style="margin-top:30px; width:200px" onclick="hideSongSelection()">Volver</button>
    </div>

    <div id="settings-panel">
        <div class="settings-card">
            <h2 class="settings-title">Ajustes</h2>
            <div class="setting-group">
                <span class="setting-label">Teclas de Juego</span>
                <div class="key-config">
                    <div class="key-input" id="k0" onclick="listenKey(0)">A</div>
                    <div class="key-input" id="k1" onclick="listenKey(1)">S</div>
                    <div class="key-input" id="k2" onclick="listenKey(2)">K</div>
                    <div class="key-input" id="k3" onclick="listenKey(3)">L</div>
                </div>
            </div>
            <div class="setting-group">
                <span class="setting-label">Volumen Música</span>
                <input type="range" id="vol-range" min="0" max="1" step="0.1" value="1">
            </div>
            <div class="settings-actions">
                <button class="btn-s btn-cancel" onclick="closeSettings()">Cancelar</button>
                <button class="btn-s btn-save" onclick="saveSettings()">Guardar</button>
            </div>
        </div>
    </div>

    <div id="intro-layer">
        <div class="intro-hearts" id="intro-hearts-container">
            <svg id="ih1" class="intro-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <svg id="ih2" class="intro-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <svg id="ih3" class="intro-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </div>
        <div id="intro-msg" class="intro-text"></div>
    </div>

    <div id="game-canvas">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div class="top-bar">
            <div class="lives-container" id="lives-ui">
                <svg id="life-0" class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg id="life-1" class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg id="life-2" class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
            <div class="pause-trigger" onclick="togglePause()">
                <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
        </div>
        <div class="ui-container">
            <div id="combo-text">0</div>
            <div id="status-text">Perfect</div>
        </div>
        <div class="game-track" id="track">
            <div class="hit-bar">
                <div class="slot" id="s0" onmousedown="handleSlotInput(0, event)" ontouchstart="handleSlotInput(0, event)">
                    <svg viewBox="0 0 24 24"><path d="M21 3L3 21M3 21H12M3 21V12" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                </div>
                <div class="slot" id="s1" onmousedown="handleSlotInput(1, event)" ontouchstart="handleSlotInput(1, event)">
                    <svg viewBox="0 0 24 24"><path d="M12 21L12 3M12 21L5 14M12 21L19 14" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                </div>
                <div class="slot" id="s2" onmousedown="handleSlotInput(2, event)" ontouchstart="handleSlotInput(2, event)">
                    <svg viewBox="0 0 24 24"><path d="M12 3L12 21M12 3L5 10M12 3L19 10" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                </div>
                <div class="slot" id="s3" onmousedown="handleSlotInput(3, event)" ontouchstart="handleSlotInput(3, event)">
                    <svg viewBox="0 0 24 24"><path d="M3 3L21 21M21 21H12M21 21V12" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <h2 id="overlay-title" class="overlay-title">Pausa</h2>
        <div id="results-container" style="display: none; width: 100%;">
            <div class="results-panel">
                <div class="grade-display" id="res-grade">S</div>
                <div class="results-grid">
                    <div class="res-item"><span id="res-label-puntos">Puntos</span><b id="res-score">0</b></div>
                    <div class="res-item"><span>Combo Máx.</span><b id="res-combo">0</b></div>
                    <div class="res-item"><span>Perfect</span><b id="res-perfect">0</b></div>
                    <div class="res-item"><span>Fallos</span><b id="res-miss">0</b></div>
                </div>
            </div>
        </div>
        <div class="overlay-menu">
            <div class="nav-item active" id="resume-btn" onclick="togglePause()">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Reanudar (Enter)
            </div>
            <div class="nav-item" id="restart-btn" onclick="handleInteraction('restart')">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg> Reiniciar
            </div>
            <div class="nav-item" id="settings-btn" onclick="openSettings()">
                <svg viewBox="0 0 24 24"><path d="M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg> Ajustes
            </div>
            <div class="nav-item" onclick="goHome()">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg> Volver al Inicio
            </div>
        </div>
    </div>

    <script>
        const menu = document.getElementById('main-menu');
        const songSelect = document.getElementById('song-selection');
        const intro = document.getElementById('intro-layer');
        const canvas = document.getElementById('game-canvas');
        const comboEl = document.getElementById('combo-text');
        const statusEl = document.getElementById('status-text');
        const overlay = document.getElementById('overlay');
        const track = document.getElementById('track');
        const audio = document.getElementById('game-audio');
        const progressBar = document.getElementById('progress-bar');
        const settingsPanel = document.getElementById('settings-panel');
        const livesUI = document.getElementById('lives-ui');
        
        const songs = [
            { id: 0, name: "Puertas", artist: "El Cuarteto de Nos", path: "music/puertas.mp3", duration: 228, diff: 180 },
            { id: 1, name: "ART OF GUITAR", artist: "Marcin, RJ Pasin", path: "music/marcin.mp3", duration: 143, diff: 155 },
            { id: 2, name: "Everything Black", artist: "Unlike Pluto", path: "music/unlike.mp3", duration: 229, diff: 180 },
            { id: 3, name: "Chop Suey!", artist: "System Of A Down", path: "music/system.mp3", duration: 208, diff: 170 },
            { id: 4, name: "Adoウタカタララバイウタ ONE PIECE", artist: "Ado", path: "music/onepiece.mp3", duration: 193, diff: 135 },
            { id: 5, name: "Big Metra Pañuelito Rojo", artist: "Big Metra", path: "music/bigmetra.mp3", duration: 216, diff: 110, boosted: true },
            { id: 6, name: "BIG METRA - TRATO DE NO TRABARME", artist: "Big Metra", path: "music/bigmetra2.mp3", duration: 228, diff: 85, death: true },
            { id: 7, name: "PUPPET VS TAILS DOLL RAP", artist: "Kronno Zomber & Cyclo Ft. Punyaso", path: "music/puppet.mp3", duration: 285, diff: 145, mission: true }
        ];

        let selectedSongIndex = 0;
        let combo = 0;
        let maxCombo = 0;
        let score = 0;
        let perfects = 0;
        let misses = 0;
        let lives = 3;
        let isPaused = false;
        let isDead = false;
        let activeNotes = [];
        let audioCtx, analyzer, dataArray, source;
        let lastBeatTime = 0;
        let currentFallSpeed = 2.5;
        let analyzerActive = false;
        let gameKeys = ['a', 's', 'k', 'l'];
        let listeningIndex = -1;

        function loadConfig() {
            const savedKeys = localStorage.getItem('gameKeys');
            if(savedKeys) {
                gameKeys = JSON.parse(savedKeys);
                gameKeys.forEach((key, i) => document.getElementById(`k${i}`).textContent = key);
            }
            const savedVol = localStorage.getItem('gameVolume');
            if(savedVol) {
                audio.volume = parseFloat(savedVol);
                document.getElementById('vol-range').value = savedVol;
            }
            renderSongList();
        }

        function renderSongList() {
            const list = document.getElementById('main-song-list');
            list.innerHTML = '';
            const completions = JSON.parse(localStorage.getItem('completedSongs') || '{}');
            
            songs.forEach((s, i) => {
                const compData = completions[s.id];
                const card = document.createElement('div');
                card.className = `song-card ${compData ? 'completed' : ''}`;
                card.onclick = () => selectSong(i);
                
                let diffHtml = '';
                if(s.death) diffHtml = '<span class="diff-tag death-tag">Muerte</span>';
                else if(s.boosted) diffHtml = '<span class="diff-tag boost-tag">Potenciado</span>';
                else if(s.diff < 150) diffHtml = '<span class="diff-tag hard-tag">Difícil</span>';

                let missionHtml = '';
                if(s.mission) {
                    missionHtml = `
                    <div class="mission-icon">
                        <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    </div>`;
                }

                card.innerHTML = `
                    ${missionHtml}
                    <div class="song-info">
                        <h3>${s.name} ${diffHtml}</h3>
                        <p>Artista: ${s.artist}</p>
                        ${compData ? `<span class="best-score">Mejor: ${compData.score} pts (${compData.grade})</span>` : ''}
                    </div>
                    <svg viewBox="0 0 24 24" width="30" height="30" fill="${s.death ? '#ff0000' : 'white'}">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                `;
                list.appendChild(card);
            });
        }

        function showSongSelection() { songSelect.style.display = 'flex'; }
        function hideSongSelection() { songSelect.style.display = 'none'; }

        function selectSong(index) {
            selectedSongIndex = index;
            audio.src = songs[index].path;
            audio.load();
            hideSongSelection();
            handleInteraction('play');
        }

        function openSettings() { settingsPanel.style.display = 'flex'; }
        function closeSettings() { settingsPanel.style.display = 'none'; listeningIndex = -1; document.querySelectorAll('.key-input').forEach(el => el.classList.remove('waiting')); }
        function listenKey(index) { listeningIndex = index; document.querySelectorAll('.key-input').forEach(el => el.classList.remove('waiting')); document.getElementById(`k${index}`).classList.add('waiting'); }

        window.addEventListener('keydown', (e) => {
            if(listeningIndex !== -1) {
                const key = e.key.toLowerCase();
                if(key === 'escape') { closeSettings(); return; }
                gameKeys[listeningIndex] = key;
                document.getElementById(`k${listeningIndex}`).textContent = key;
                document.getElementById(`k${listeningIndex}`).classList.remove('waiting');
                listeningIndex = -1;
                return;
            }
            if(e.key === 'Enter') { if(isDead) handleInteraction('restart'); else if(isPaused) togglePause(); }
            if(e.key === 'Escape') { if(canvas.style.display === 'flex' && !isDead) togglePause(); }
            if(isDead || isPaused) return;
            const idx = gameKeys.indexOf(e.key.toLowerCase());
            if(idx !== -1) handleSlotInput(idx);
        });

        function saveSettings() { localStorage.setItem('gameKeys', JSON.stringify(gameKeys)); const vol = document.getElementById('vol-range').value; audio.volume = parseFloat(vol); localStorage.setItem('gameVolume', vol); closeSettings(); }

        const icons = [
            '<svg viewBox="0 0 24 24"><path d="M21 3L3 21M3 21H12M3 21V12" stroke="black" stroke-width="2" fill="none"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M12 21L12 3M12 21L5 14M12 21L19 14" stroke="black" stroke-width="2" fill="none"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M12 3L12 21M12 3L5 10M12 3L19 10" stroke="black" stroke-width="2" fill="none"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M3 3L21 21M21 21H12M21 21V12" stroke="black" stroke-width="2" fill="none"/></svg>'
        ];

        const brokenHeartPath = "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z M11 5 L13 19 M13 5 L11 19";

        function handleInteraction(type) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                source = audioCtx.createMediaElementSource(audio);
                analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 256;
                source.connect(analyzer);
                analyzer.connect(audioCtx.destination);
                dataArray = new Uint8Array(analyzer.frequencyBinCount);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; if (type === 'play') startSequence(); else if (type === 'restart') restartGame(); }).catch(() => { if (type === 'play') startSequence(); else if (type === 'restart') restartGame(); });
        }

        function analyzeLoop() {
            if (!analyzerActive || isDead) return;
            requestAnimationFrame(analyzeLoop);
            if (isPaused) return;
            analyzer.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i = 0; i < 10; i++) sum += dataArray[i];
            let bassIntensity = sum / 10;
            let fullSum = 0;
            for(let i = 0; i < dataArray.length; i++) fullSum += dataArray[i];
            let energy = fullSum / dataArray.length;
            
            const song = songs[selectedSongIndex];
            currentFallSpeed = song.death ? 1.4 : (song.boosted ? Math.max(0.9, 1.8 - (energy / 80)) : Math.max(1.1, 2.8 - (energy / 60)));
            
            const now = Date.now();
            const threshold = song.diff;
            const minInterval = song.death ? 75 : (song.boosted ? (energy > 80 ? 95 : 180) : (energy > 80 ? 170 : 340));
            
            if (bassIntensity > threshold && (now - lastBeatTime) > minInterval) { 
                lastBeatTime = now; 
                spawnNote(Math.floor(Math.random() * 4)); 
                if((song.boosted || song.death) && energy > 100 && Math.random() > 0.4) {
                    setTimeout(() => spawnNote(Math.floor(Math.random() * 4)), song.death ? 45 : 75);
                }
            }
        }

        function startSequence() { menu.style.opacity = '0'; setTimeout(() => { menu.style.display = 'none'; intro.style.display = 'flex'; runIntro(); }, 600); }

        async function runIntro() {
            const song = songs[selectedSongIndex];
            const h = [document.getElementById('ih1'), document.getElementById('ih2'), document.getElementById('ih3')];
            const msg = document.getElementById('intro-msg');
            const wait = ms => new Promise(r => setTimeout(r, ms));
            
            if(song.death) {
                h.forEach(el => el.querySelector('path').setAttribute('d', brokenHeartPath));
                h.forEach(el => el.style.fill = '#555');
                h[0].style.opacity = '1'; h[0].style.transform = 'scale(1.2)';
                await wait(600);
            } else {
                h.forEach(el => el.querySelector('path').setAttribute('d', "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"));
                h.forEach(el => el.style.fill = '#ff4757');
                for(let i=0; i<3; i++) { h[i].style.opacity = '1'; h[i].style.transform = 'scale(1.2)'; await wait(600); }
            }

            h.forEach(x => x.style.opacity = '0'); await wait(400);
            msg.textContent = song.death ? "1 Vida" : "3 Vidas"; 
            msg.style.opacity = '1'; msg.style.transform = 'translateY(0)'; await wait(1200);
            msg.style.opacity = '0'; await wait(400);
            msg.textContent = "¿Listo?"; msg.style.opacity = '1'; await wait(1000);
            msg.style.opacity = '0'; await wait(400);
            msg.textContent = "¡Go!"; msg.style.opacity = '1'; await wait(800);
            intro.style.opacity = '0';
            setTimeout(() => { intro.style.display = 'none'; canvas.style.display = 'flex'; setTimeout(() => { canvas.style.opacity = '1'; initGame(); analyzerActive = true; analyzeLoop(); audio.play(); }, 50); }, 400);
        }

        function initGame() { 
            const song = songs[selectedSongIndex];
            isDead = false; 
            isPaused = false; 
            lives = song.death ? 1 : 3; 
            combo = 0; 
            maxCombo = 0;
            score = 0;
            perfects = 0;
            misses = 0;
            lastBeatTime = 0; 
            activeNotes.forEach(n => n.el.remove()); 
            activeNotes = []; 
            comboEl.textContent = "0"; 
            progressBar.style.width = '0%'; 
            document.getElementById('results-container').style.display = 'none';
            updateLivesUI(); 
        }

        audio.ontimeupdate = () => { 
            const song = songs[selectedSongIndex]; 
            progressBar.style.width = `${(audio.currentTime / song.duration) * 100}%`; 
        };

        audio.onended = () => { 
            isDead = true; 
            analyzerActive = false; 
            activeNotes.forEach(n => n.el.remove()); 
            activeNotes = []; 
            showResults();
        };

        function showResults() {
            const totalHits = perfects + misses;
            const accuracy = totalHits > 0 ? (perfects / totalHits) * 100 : 0;
            let grade = 'F';
            let color = '#ff4757';

            if(accuracy >= 98) { grade = 'SS'; color = '#eab000'; }
            else if(accuracy >= 93) { grade = 'S'; color = '#00d2ff'; }
            else if(accuracy >= 85) { grade = 'A'; color = '#2ed573'; }
            else if(accuracy >= 70) { grade = 'B'; color = '#3742fa'; }
            else if(accuracy >= 50) { grade = 'C'; color = '#888'; }

            document.getElementById('res-grade').textContent = grade;
            document.getElementById('res-grade').style.color = color;
            document.getElementById('res-score').textContent = score;
            document.getElementById('res-combo').textContent = maxCombo;
            document.getElementById('res-perfect').textContent = perfects;
            document.getElementById('res-miss').textContent = misses;
            document.getElementById('res-label-puntos').textContent = "Puntuación";

            const songId = songs[selectedSongIndex].id;
            const completions = JSON.parse(localStorage.getItem('completedSongs') || '{}');
            if(!completions[songId] || score > completions[songId].score) {
                completions[songId] = { score, grade };
                localStorage.setItem('completedSongs', JSON.stringify(completions));
                renderSongList();
            }

            overlay.style.display = 'flex';
            document.getElementById('results-container').style.display = 'block';
            document.getElementById('overlay-title').textContent = "Finish";
            document.getElementById('resume-btn').style.display = 'none';
        }

        function spawnNote(lane) {
            if (isDead || isPaused) return;
            const n = document.createElement('div');
            n.className = 'note';
            n.innerHTML = icons[lane];
            n.setAttribute('data-lane', lane);
            const slot = document.getElementById(`s${lane}`);
            n.style.left = slot.offsetLeft + 'px';
            n.style.animation = `noteFall ${currentFallSpeed}s linear forwards`;
            track.appendChild(n);
            const obj = { el: n, lane, hit: false, id: Math.random() };
            activeNotes.push(obj);
            n.addEventListener('animationend', () => { if(!obj.hit && !isPaused && !isDead) loseLife(); n.remove(); activeNotes = activeNotes.filter(x => x.id !== obj.id); });
        }

        function handleSlotInput(lane, event) {
            if(event) { event.stopPropagation(); event.preventDefault(); }
            if(isPaused || isDead) return;
            const s = document.getElementById(`s${lane}`);
            s.classList.add('pressed'); setTimeout(() => s.classList.remove('pressed'), 60);
            const sRect = s.getBoundingClientRect();
            const sY = sRect.top + (sRect.height / 2);
            let hitFound = false;
            for(let i = 0; i < activeNotes.length; i++) {
                const n = activeNotes[i];
                if(n.lane === lane && !n.hit) {
                    const nRect = n.el.getBoundingClientRect();
                    const nY = nRect.top + (nRect.height / 2);
                    const d = Math.abs(nY - sY);
                    if(d < 110) {
                        hitFound = true; n.hit = true; n.el.style.display = 'none';
                        if(d < 40) { 
                            combo++; 
                            score += (100 * (1 + combo * 0.1));
                            perfects++;
                            updateStatus('Perfect', '#00ffcc'); 
                        }
                        else { 
                            combo++; 
                            score += (50 * (1 + combo * 0.05));
                            updateStatus('Bien', '#ffcc00'); 
                        }
                        if(combo > maxCombo) maxCombo = combo;
                        break;
                    }
                }
            }
            if(!hitFound) loseLife();
            comboEl.textContent = combo;
        }

        function loseLife() { 
            if(isDead) return;
            lives--; 
            misses++;
            updateLivesUI(); 
            if(lives <= 0) { 
                isDead = true; 
                analyzerActive = false; 
                audio.pause(); 
                showGameOver(); 
            } 
            updateStatus('Miss', '#ff4757'); 
            combo = 0; 
            comboEl.textContent = "0"; 
        }

        function showGameOver() {
            document.getElementById('res-grade').textContent = "F";
            document.getElementById('res-grade').style.color = "#ff4757";
            document.getElementById('res-score').textContent = score;
            document.getElementById('res-combo').textContent = maxCombo;
            document.getElementById('res-perfect').textContent = perfects;
            document.getElementById('res-miss').textContent = misses;
            document.getElementById('res-label-puntos').textContent = "Puntuación Final";
            
            overlay.style.display = 'flex';
            document.getElementById('results-container').style.display = 'block';
            document.getElementById('overlay-title').textContent = "Game Over";
            document.getElementById('resume-btn').style.display = 'none';
            document.getElementById('restart-btn').textContent = "Reintentar (Enter)";
        }

        function updateLivesUI() { 
            const song = songs[selectedSongIndex];
            const max = song.death ? 1 : 3;
            for(let i=0; i<3; i++) {
                const h = document.getElementById(`life-${i}`);
                if(i >= max) h.style.display = 'none';
                else {
                    h.style.display = 'block';
                    h.style.opacity = i < lives ? '1' : '0.1';
                }
            }
        }

        function togglePause() { if(isDead) return; isPaused = !isPaused; if(isPaused) audio.pause(); else audio.play(); if(isPaused) { showOverlay("Pausa", true); document.getElementById('results-container').style.display = 'none'; } else overlay.style.display = 'none'; activeNotes.forEach(n => n.el.style.animationPlayState = isPaused ? 'paused' : 'running'); }
        function showOverlay(title, showControls) { overlay.style.display = 'flex'; document.getElementById('overlay-title').textContent = title; document.getElementById('resume-btn').style.display = showControls ? 'flex' : 'none'; document.getElementById('settings-btn').style.display = showControls ? 'flex' : 'none'; }
        function restartGame() { overlay.style.display = 'none'; initGame(); audio.currentTime = 0; audio.play(); analyzerActive = true; analyzeLoop(); }
        function goHome() { location.reload(); }
        function updateStatus(t, c) { statusEl.textContent = t; statusEl.style.color = c; statusEl.style.opacity = '1'; setTimeout(() => statusEl.style.opacity = '0', 400); }
        
        loadConfig();
    </script>
</body>
</html>
