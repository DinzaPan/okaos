<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKAOs - Rhythm Engine Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        :root {
            --bg: #030308;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --k1: #ff4757;
            --k2: #3742fa;
            --k3: #2ed573;
            --k4: #eab000;
            --boost: #00f2ff;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at 50% 50%, #111125 0%, #030308 100%);
            color: white;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .center-bg {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 20rem;
            font-weight: 700;
            opacity: 0.02;
            pointer-events: none;
            letter-spacing: -10px;
        }

        #main-ui {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #left-bar-container {
            position: fixed;
            left: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .menu-bar {
            background: linear-gradient(90deg, var(--glass) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid var(--border);
            border-left: none;
            padding: 22px 60px 22px 40px;
            width: 300px;
            border-radius: 0 50px 50px 0;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            transform: translateX(-100%);
            animation: bounceInLeft 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .menu-bar:hover, .menu-bar.active {
            background: var(--accent);
            color: #000;
            width: 340px;
        }

        #right-song-container, #right-settings-container {
            position: fixed;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            height: 85vh;
            overflow-y: auto;
            padding: 20px 0;
            scrollbar-width: none;
            touch-action: pan-y;
            align-items: flex-end;
            transition: 0.5s;
        }

        #right-song-container::-webkit-scrollbar, #right-settings-container::-webkit-scrollbar { display: none; }

        .song-bar, .setting-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-right: none;
            padding: 30px 40px 30px 80px;
            width: 580px;
            border-radius: 80px 0 0 80px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .song-bar.exit, .setting-item.exit {
            transform: translateX(120%) !important;
            opacity: 0;
        }

        .song-bar.enter, .setting-item.enter {
            animation: bounceInRight 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .song-bar.boosted {
            border-color: var(--boost);
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .boost-tag {
            position: absolute;
            top: 15px;
            left: 40px;
            background: var(--boost);
            color: #000;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px var(--boost);
        }

        .song-bar:hover, .setting-item:hover {
            background: rgba(255, 255, 255, 0.1);
            width: 660px;
            border-color: rgba(255, 255, 255, 0.5);
        }

        .disc-wrap {
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .disc-svg {
            width: 45px;
            height: 45px;
            fill: #fff;
            animation: spin 4s linear infinite;
        }

        .song-info, .setting-info { text-align: right; }
        .song-info h3, .setting-info h3 { font-size: 1.8rem; margin-bottom: 5px; }
        .song-info p, .setting-info p { font-size: 1.1rem; opacity: 0.7; }

        .key-config-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .key-input {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 15px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
        }

        .key-input.waiting {
            border-color: #fff;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        @keyframes bounceInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes bounceInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #game-canvas {
            display: none;
            width: 100%;
            height: 100%;
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0a0a15 0%, #000 100%);
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s;
            z-index: 500;
        }

        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            z-index: 60;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            transition: width 0.1s linear;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 50;
        }

        .lives-container { display: flex; gap: 8px; }
        .life-heart { width: 30px; height: 30px; fill: #ff4757; transition: opacity 0.3s, transform 0.3s; }

        .pause-trigger {
            width: 45px;
            height: 45px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .pause-trigger svg { width: 24px; height: 24px; fill: white; }

        .game-track {
            position: relative;
            width: 500px;
            height: 100%;
            background: rgba(255,255,255,0.02);
            border-left: 2px solid var(--border);
            border-right: 2px solid var(--border);
            display: flex;
            justify-content: center;
        }

        .hit-bar {
            position: absolute;
            bottom: 80px;
            width: 100%;
            display: flex;
            justify-content: space-evenly;
            padding: 0 10px;
            z-index: 100;
        }

        .slot {
            width: 85px;
            height: 85px;
            border: 3px solid var(--border);
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.03);
            transition: all 0.05s;
            position: relative;
        }

        #s0 { border-color: var(--k1); }
        #s1 { border-color: var(--k2); }
        #s2 { border-color: var(--k3); }
        #s3 { border-color: var(--k4); }

        #s0.pressed { background: var(--k1) !important; box-shadow: 0 0 30px var(--k1); border-color: #fff; transform: scale(0.9); }
        #s1.pressed { background: var(--k2) !important; box-shadow: 0 0 30px var(--k2); border-color: #fff; transform: scale(0.9); }
        #s2.pressed { background: var(--k3) !important; box-shadow: 0 0 30px var(--k3); border-color: #fff; transform: scale(0.9); }
        #s3.pressed { background: var(--k4) !important; box-shadow: 0 0 30px var(--k4); border-color: #fff; transform: scale(0.9); }

        .slot svg { width: 45px; height: 45px; fill: white; opacity: 0.8; pointer-events: none; }

        .note {
            position: absolute;
            width: 85px;
            height: 85px;
            background: #fff;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(255,255,255,0.4);
            pointer-events: none;
            z-index: 10;
        }

        .note[data-lane="0"] { border: 4px solid var(--k1); }
        .note[data-lane="1"] { border: 4px solid var(--k2); }
        .note[data-lane="2"] { border: 4px solid var(--k3); }
        .note[data-lane="3"] { border: 4px solid var(--k4); }
        .note svg { width: 45px; height: 45px; fill: #000; }

        .ui-container {
            position: absolute;
            top: 20%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            width: 100%;
            z-index: 200;
        }

        #combo-text { font-size: 6rem; font-weight: 700; color: rgba(255,255,255,0.2); transition: 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #status-text { font-size: 2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 8px; opacity: 0; transition: 0.2s; }

        #overlay-game {
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .results-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 50px;
            margin-bottom: 30px;
            width: 500px;
            text-align: center;
        }

        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .res-item { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        .res-item span { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }
        .res-item b { font-size: 1.8rem; color: #fff; }
        
        .star-display { font-size: 4rem; margin-bottom: 15px; display: flex; justify-content: center; gap: 15px; }
        .star { color: rgba(255, 255, 255, 0.1); transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .star.active { color: #ffd700; text-shadow: 0 0 40px #ffd700; transform: scale(1.2); }

        #intro-layer {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .intro-hearts { display: flex; gap: 20px; margin-bottom: 30px; }

        .intro-heart {
            width: 60px;
            height: 60px;
            fill: #ff4757;
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .intro-text {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: #fff;
            color: #000;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .action-btn:active { transform: scale(0.95); }
        .action-btn.secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--border); }

    </style>
</head>
<body>
    <audio id="game-audio" preload="auto" crossorigin="anonymous"></audio>
    <div class="center-bg">OKAOs</div>
    
    <div id="main-ui">
        <div id="left-bar-container">
            <div id="btn-inicio" class="menu-bar active" style="animation-delay: 0.1s;" onclick="showMainView()">Inicio</div>
            <div class="menu-bar" style="animation-delay: 0.2s;">Perfil</div>
            <div class="menu-bar" style="animation-delay: 0.3s;">Misiones</div>
            <div id="btn-ajustes" class="menu-bar" style="animation-delay: 0.4s;" onclick="showSettingsView()">Ajustes</div>
        </div>
        <div id="right-song-container"></div>
        <div id="right-settings-container" style="display: none;">
            <div class="setting-item enter">
                <div class="setting-info">
                    <h3>Controles</h3>
                    <p>Configura tus teclas de juego</p>
                    <div class="key-config-grid">
                        <div class="key-input" id="cfg-0" onclick="startKeyCapture(0)">A</div>
                        <div class="key-input" id="cfg-1" onclick="startKeyCapture(1)">S</div>
                        <div class="key-input" id="cfg-2" onclick="startKeyCapture(2)">K</div>
                        <div class="key-input" id="cfg-3" onclick="startKeyCapture(3)">L</div>
                    </div>
                </div>
            </div>
            <div class="setting-item enter" style="animation-delay: 0.1s;">
                <div class="setting-info">
                    <h3>Audio</h3>
                    <p>Volumen Maestro</p>
                    <input type="range" id="vol-range" min="0" max="1" step="0.1" value="1" style="width:100%; margin-top:15px;" oninput="updateVolume(this.value)">
                </div>
            </div>
            <div class="setting-item enter" style="animation-delay: 0.2s;" onclick="saveLocalSettings()">
                <div class="setting-info">
                    <h3>Guardar</h3>
                    <p>Aplicar todos los cambios</p>
                </div>
            </div>
        </div>
    </div>

    <div id="intro-layer">
        <div class="intro-hearts">
            <svg id="ih1" class="intro-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <svg id="ih2" class="intro-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <svg id="ih3" class="intro-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </div>
        <div id="intro-msg" class="intro-text"></div>
    </div>

    <div id="game-canvas">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div class="top-bar">
            <div class="lives-container" id="lives-ui">
                <svg id="life-0" class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg id="life-1" class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg id="life-2" class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
            <div class="pause-trigger" onclick="togglePause()"><svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></div>
        </div>
        <div class="ui-container">
            <div id="combo-text">0</div>
            <div id="status-text">Perfect</div>
        </div>
        <div class="game-track" id="track">
            <div class="hit-bar">
                <div class="slot" id="s0" data-l="0"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" /></svg></div>
                <div class="slot" id="s1" data-l="1"><svg viewBox="0 0 24 24"><path d="M20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.58-5.59L4 12l8 8 8-8z" /></svg></div>
                <div class="slot" id="s2" data-l="2"><svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z" /></svg></div>
                <div class="slot" id="s3" data-l="3"><svg viewBox="0 0 24 24"><path d="M4 11h12.17l-5.58-5.59L12 4l8 8-8 8-1.41-1.41L16.17 13H4v-2z" /></svg></div>
            </div>
        </div>
    </div>

    <div id="overlay-game">
        <h2 id="overlay-title" style="font-size:3rem; margin-bottom:20px;">PAUSA</h2>
        <div id="results-container" style="display:none;">
            <div class="results-panel">
                <div class="star-display" id="res-stars">
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">★</span>
                </div>
                <div class="results-grid">
                    <div class="res-item"><span>Puntos</span><b id="res-score">0</b></div>
                    <div class="res-item"><span>Combo Máx.</span><b id="res-combo">0</b></div>
                    <div class="res-item"><span>Perfect</span><b id="res-perfect">0</b></div>
                    <div class="res-item"><span>Fallos</span><b id="res-miss">0</b></div>
                </div>
            </div>
        </div>
        <div style="width: 450px; display: flex; flex-direction: column; gap: 10px;">
            <button class="action-btn" onclick="togglePause()">REANUDAR</button>
            <button class="action-btn" onclick="restartSong()">REINICIAR</button>
            <button class="action-btn secondary" onclick="location.reload()">VOLVER AL MENÚ</button>
        </div>
    </div>

    <script>
        const songs = [
            { id: 0, name: "Puertas", artist: "El Cuarteto de Nos", path: "music/puertas.mp3", duration: 228, diff: 180, speed: 2.5 },
            { id: 1, name: "ART OF GUITAR", artist: "Marcin, RJ Pasin", path: "music/marcin.mp3", duration: 143, diff: 155, speed: 1.8, boosted: true },
            { id: 2, name: "Everything Black", artist: "Unlike Pluto", path: "music/unlike.mp3", duration: 229, diff: 180, speed: 2.2 },
            { id: 3, name: "Chop Suey!", artist: "System Of A Down", path: "music/system.mp3", duration: 208, diff: 170, speed: 1.6 },
            { id: 4, name: "Adoウタカタララバイ", artist: "Ado", path: "music/onepiece.mp3", duration: 193, diff: 135, speed: 2.0 },
            { id: 5, name: "Pañuelito Rojo", artist: "Big Metra", path: "music/bigmetra.mp3", duration: 216, diff: 110, speed: 1.5 },
            { id: 6, name: "Trato de no trabarme", artist: "Big Metra", path: "music/bigmetra2.mp3", duration: 228, diff: 75, death: true, speed: 1.3 },
            { id: 7, name: "Puppet vs Tails Doll", artist: "Kronno Zomber", path: "music/puppet.mp3", duration: 285, diff: 130, speed: 2.1 },
            { id: 8, name: "AiAiA", artist: "Ado", path: "music/aiaia.mp3", duration: 259, diff: 145, speed: 2.2 }
        ];

        const arrowSvgs = [
            '<svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" /></svg>',
            '<svg viewBox="0 0 24 24"><path d="M20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.58-5.59L4 12l8 8 8-8z" /></svg>',
            '<svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z" /></svg>',
            '<svg viewBox="0 0 24 24"><path d="M4 11h12.17l-5.58-5.59L12 4l8 8-8 8-1.41-1.41L16.17 13H4v-2z" /></svg>'
        ];

        let gameKeys = ['a', 's', 'k', 'l'];
        let captureIndex = -1, selectedSongIndex = 0;
        let combo = 0, maxCombo = 0, score = 0, perfects = 0, misses = 0, lives = 3;
        let isPaused = false, isDead = false, analyzerActive = false;
        let activeNotes = [];
        let audioCtx, analyzer, dataArray;
        let lastSpawn = 0, spawnCooldown = 120;
        const audio = document.getElementById('game-audio');

        function initSongList() {
            const container = document.getElementById('right-song-container');
            container.innerHTML = '';
            songs.forEach((s, i) => {
                const bar = document.createElement('div');
                bar.className = `song-bar enter`;
                bar.style.animationDelay = `${i * 0.05}s`;
                bar.onclick = () => startSequence(i);
                bar.innerHTML = `
                    ${s.boosted ? '<div class="boost-tag">POTENCIADO</div>' : ''}
                    <div class="disc-wrap">
                        <svg class="disc-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
                    </div>
                    <div class="song-info">
                        <h3>${s.name}</h3>
                        <p>${s.artist}</p>
                        <span class="diff-badge">${s.death ? 'LEGEND' : 'HARD'} • LVL ${Math.floor((200-s.diff)/10)}</span>
                    </div>
                `;
                container.appendChild(bar);
            });
        }

        async function showSettingsView() {
            document.getElementById('btn-inicio').classList.remove('active');
            document.getElementById('btn-ajustes').classList.add('active');
            
            const bars = document.querySelectorAll('.song-bar');
            for(let i = bars.length - 1; i >= 0; i--) {
                bars[i].classList.add('exit');
                await new Promise(r => setTimeout(r, 50));
            }

            setTimeout(() => {
                document.getElementById('right-song-container').style.display = 'none';
                document.getElementById('right-settings-container').style.display = 'flex';
                const settings = document.querySelectorAll('.setting-item');
                settings.forEach(s => s.classList.remove('exit'));
            }, 400);
        }

        async function showMainView() {
            document.getElementById('btn-ajustes').classList.remove('active');
            document.getElementById('btn-inicio').classList.add('active');

            const settings = document.querySelectorAll('.setting-item');
            for(let i = settings.length - 1; i >= 0; i--) {
                settings[i].classList.add('exit');
                await new Promise(r => setTimeout(r, 50));
            }

            setTimeout(() => {
                document.getElementById('right-settings-container').style.display = 'none';
                document.getElementById('right-song-container').style.display = 'flex';
                initSongList();
            }, 400);
        }

        function startKeyCapture(index) {
            captureIndex = index;
            document.querySelectorAll('.key-input').forEach(el => el.classList.remove('waiting'));
            document.getElementById(`cfg-${index}`).classList.add('waiting');
        }

        function updateVolume(val) {
            audio.volume = val;
        }

        function saveLocalSettings() {
            localStorage.setItem('okao_keys', JSON.stringify(gameKeys));
            localStorage.setItem('okao_vol', audio.volume);
            alert("Ajustes Guardados");
        }

        function loadSavedSettings() {
            const savedKeys = localStorage.getItem('okao_keys');
            const savedVol = localStorage.getItem('okao_vol');
            if (savedKeys) {
                gameKeys = JSON.parse(savedKeys);
                gameKeys.forEach((k, i) => document.getElementById(`cfg-${i}`).textContent = k);
            }
            if (savedVol) {
                audio.volume = savedVol;
                document.getElementById('vol-range').value = savedVol;
            }
        }

        async function startSequence(index) {
            selectedSongIndex = index;
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyzer = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(analyzer);
                analyzer.connect(audioCtx.destination);
                analyzer.fftSize = 256;
                dataArray = new Uint8Array(analyzer.frequencyBinCount);
            }
            audio.src = songs[index].path;
            audio.load();
            document.getElementById('main-ui').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('main-ui').style.display = 'none';
                document.getElementById('intro-layer').style.display = 'flex';
                runIntro();
            }, 500);
        }

        async function runIntro() {
            const msg = document.getElementById('intro-msg');
            const h = [document.getElementById('ih1'), document.getElementById('ih2'), document.getElementById('ih3')];
            for(let i=0; i<3; i++) { h[i].style.opacity = '1'; h[i].style.transform = 'scale(1)'; await new Promise(r => setTimeout(r, 400)); }
            msg.textContent = "¿LISTO?"; msg.style.opacity = '1'; await new Promise(r => setTimeout(r, 800));
            msg.textContent = "¡GO!"; await new Promise(r => setTimeout(r, 500));
            document.getElementById('intro-layer').style.display = 'none';
            document.getElementById('game-canvas').style.display = 'flex';
            setTimeout(() => { document.getElementById('game-canvas').style.opacity = '1'; initGame(); }, 50);
        }

        function initGame() {
            isDead = false; isPaused = false; analyzerActive = true;
            lives = songs[selectedSongIndex].death ? 1 : 3;
            combo = 0; score = 0; perfects = 0; misses = 0; maxCombo = 0;
            audio.currentTime = 0;
            audio.playbackRate = 1.0;
            audio.play();
            updateLivesUI();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!analyzerActive || isPaused || isDead) return;
            analyzer.getByteFrequencyData(dataArray);
            
            let bass = 0, lowMid = 0, mid = 0, treble = 0;
            for(let i=0; i<4; i++) bass += dataArray[i];
            for(let i=4; i<12; i++) lowMid += dataArray[i];
            for(let i=12; i<30; i++) mid += dataArray[i];
            for(let i=30; i<60; i++) treble += dataArray[i];

            bass /= 4; lowMid /= 8; mid /= 18; treble /= 30;

            let dynamicPlayback = 1.0 + (treble / 350);
            audio.playbackRate = Math.min(1.4, Math.max(0.85, dynamicPlayback));

            const now = Date.now();
            const song = songs[selectedSongIndex];
            
            if (now - lastSpawn > spawnCooldown) {
                if (bass > song.diff) { spawnNote(0); lastSpawn = now; }
                else if (lowMid > song.diff + 15) { spawnNote(1); lastSpawn = now; }
                else if (mid > song.diff + 25) { spawnNote(2); lastSpawn = now; }
                else if (treble > song.diff + 40) { spawnNote(3); lastSpawn = now; }
            }

            activeNotes.forEach(n => {
                let currentY = parseFloat(n.el.style.top || -100);
                let speedBase = song.speed * 9;
                let finalSpeed = speedBase * audio.playbackRate;
                
                n.el.style.top = (currentY + finalSpeed) + 'px';
                
                if (currentY > window.innerHeight) {
                    n.el.remove();
                    activeNotes = activeNotes.filter(x => x.id !== n.id);
                    if (!n.hit) loseLife();
                }
            });

            requestAnimationFrame(gameLoop);
        }

        function spawnNote(lane) {
            const id = Math.random();
            const el = document.createElement('div');
            el.className = 'note';
            el.dataset.lane = lane;
            el.innerHTML = arrowSvgs[lane];
            
            const slot = document.getElementById(`s${lane}`);
            const trackRect = document.getElementById('track').getBoundingClientRect();
            const slotRect = slot.getBoundingClientRect();
            
            const relativeLeft = slotRect.left - trackRect.left;
            
            el.style.left = relativeLeft + 'px';
            el.style.top = '-100px';
            document.getElementById('track').appendChild(el);
            activeNotes.push({ id, el, lane, hit: false });
        }

        function handleInput(lane) {
            if(isPaused || isDead) return;
            const slot = document.getElementById(`s${lane}`);
            slot.classList.add('pressed');
            setTimeout(() => slot.classList.remove('pressed'), 100);

            const hitZone = window.innerHeight - 165;
            let note = activeNotes.find(n => n.lane == lane && !n.hit && parseFloat(n.el.style.top) > hitZone - 100);

            if (note) {
                const noteY = parseFloat(note.el.style.top);
                const dist = Math.abs(noteY - hitZone);
                note.hit = true;
                note.el.remove();
                
                if (dist < 45) { 
                    score += (100 * (1 + combo * 0.02)); 
                    combo++; 
                    perfects++;
                    updateStatus('PERFECT', '#00ffcc'); 
                } else { 
                    score += (50 * (1 + combo * 0.01)); 
                    combo++; 
                    updateStatus('GREAT', '#eab000'); 
                }

                if (combo > maxCombo) maxCombo = combo;
                document.getElementById('combo-text').textContent = combo;
                document.getElementById('combo-text').style.transform = 'scale(1.2)';
                setTimeout(() => document.getElementById('combo-text').style.transform = 'scale(1)', 100);
            } else {
                loseLife();
            }
        }

        function loseLife() {
            lives--; misses++; combo = 0;
            document.getElementById('combo-text').textContent = "0";
            updateLivesUI();
            updateStatus('MISS', '#ff4757');
            if (lives <= 0) endGame(false);
        }

        function updateLivesUI() {
            for(let i=0; i<3; i++) document.getElementById(`life-${i}`).style.opacity = i < lives ? '1' : '0.1';
        }

        function updateStatus(t, c) {
            const s = document.getElementById('status-text');
            s.textContent = t; s.style.color = c; s.style.opacity = '1';
            setTimeout(() => { if(s.textContent === t) s.style.opacity = '0'; }, 500);
        }

        function togglePause() {
            if(isDead) return;
            isPaused = !isPaused;
            if (isPaused) audio.pause(); else { audio.play(); requestAnimationFrame(gameLoop); }
            document.getElementById('overlay-game').style.display = isPaused ? 'flex' : 'none';
            document.getElementById('overlay-title').textContent = "PAUSA";
            document.getElementById('results-container').style.display = 'none';
        }

        function restartSong() {
            activeNotes.forEach(n => n.el.remove());
            activeNotes = [];
            initGame();
            document.getElementById('overlay-game').style.display = 'none';
        }

        function endGame(win) {
            isDead = true; analyzerActive = false; audio.pause();
            document.getElementById('overlay-game').style.display = 'flex';
            document.getElementById('results-container').style.display = 'block';
            document.getElementById('overlay-title').textContent = win ? "¡COMPLETADO!" : "HAS PERDIDO";
            
            const stars = document.querySelectorAll('.star');
            stars.forEach(s => s.classList.remove('active'));
            if(win) {
                stars[0].classList.add('active');
                if(lives >= 2) stars[1].classList.add('active');
                if(misses === 0) stars[2].classList.add('active');
            }

            document.getElementById('res-score').textContent = Math.floor(score);
            document.getElementById('res-combo').textContent = maxCombo;
            document.getElementById('res-perfect').textContent = perfects;
            document.getElementById('res-miss').textContent = misses;
        }

        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (captureIndex !== -1) {
                gameKeys[captureIndex] = k;
                document.getElementById(`cfg-${captureIndex}`).textContent = k;
                document.getElementById(`cfg-${captureIndex}`).classList.remove('waiting');
                captureIndex = -1;
                return;
            }
            if (e.key === 'Escape') togglePause();
            const idx = gameKeys.indexOf(k);
            if (idx !== -1) handleInput(idx);
        });

        audio.ontimeupdate = () => {
            document.getElementById('progress-bar').style.width = `${(audio.currentTime / audio.duration) * 100}%`;
        };
        audio.onended = () => endGame(true);

        loadSavedSettings();
        initSongList();
    </script>
</body>
</html>
