<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKAOs - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg: #020205;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at center, #0f0f1a 0%, #020205 100%);
            color: white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-logo {
            font-size: 10rem;
            font-weight: 700;
            letter-spacing: -5px;
            opacity: 0.15;
            position: absolute;
            pointer-events: none;
        }

        #side-nav {
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            width: 300px;
            background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            gap: 15px;
            transform: translateX(-100%);
            animation: bounceLeft 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        #music-bar {
            position: fixed;
            right: 0;
            top: 0;
            height: 100%;
            width: 380px;
            background: linear-gradient(-90deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            padding: 40px;
            gap: 20px;
            transform: translateX(100%);
            animation: bounceRight 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .menu-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 18px 30px;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: #aaa;
        }

        .menu-btn:hover {
            background: var(--accent);
            color: #000;
            transform: translateX(10px);
        }

        .song-container {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .song-container:hover {
            border-color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .disc {
            width: 50px;
            height: 50px;
            fill: #fff;
            animation: spin 3s linear infinite;
        }

        .song-info { flex: 1; }
        .song-info h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .song-info p { font-size: 0.8rem; color: #888; }

        @keyframes bounceLeft { to { transform: translateX(0); } }
        @keyframes bounceRight { to { transform: translateX(0); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #settings-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background: #111;
            padding: 40px;
            border-radius: 25px;
            border: 1px solid var(--border);
            width: 400px;
        }
    </style>
</head>
<body>

    <div class="center-logo">OKAOs</div>

    <div id="side-nav">
        <div class="menu-btn">Inicio</div>
        <div class="menu-btn">Perfil</div>
        <div class="menu-btn">Misiones</div>
        <div class="menu-btn" onclick="openSet()">Ajustes</div>
    </div>

    <div id="music-bar">
        <div class="song-container" onclick="launchGame('Puertas', 'music/puertas.mp3', '3:48')">
            <svg class="disc" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
            <div class="song-info">
                <h3>Puertas</h3>
                <p>Normal • 3:48</p>
                <p style="color: #2ed573; font-size: 0.7rem; margin-top: 4px;">Puntuación: 0</p>
            </div>
        </div>
    </div>

    <div id="settings-modal">
        <div class="modal-box">
            <h2>Ajustes</h2>
            <div style="margin: 20px 0;">
                <label>Volumen</label>
                <input type="range" id="v-range" min="0" max="1" step="0.1" value="1" style="width: 100%;">
            </div>
            <button class="menu-btn" style="width: 100%; background: #fff; color: #000;" onclick="saveSet()">Guardar</button>
        </div>
    </div>

    <script>
        function launchGame(name, path, dur) {
            localStorage.setItem('currentSong', JSON.stringify({ name, path, dur }));
            document.body.style.opacity = '0';
            document.body.style.transition = '0.5s';
            setTimeout(() => { location.href = 'sc/play.html'; }, 500);
        }

        function openSet() { document.getElementById('settings-modal').style.display = 'flex'; }
        function saveSet() {
            localStorage.setItem('okao_vol', document.getElementById('v-range').value);
            document.getElementById('settings-modal').style.display = 'none';
        }
    </script>
</body>
</html>
