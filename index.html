<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKAOs - Rhythm Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        :root {
            --bg: #030307;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-hover: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.1);
            --k1: #ff3e3e;
            --k2: #3e64ff;
            --k3: #2ecc71;
            --k4: #f1c40f;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            width: 100vw;
            background: var(--bg);
            color: white;
            overflow: hidden;
            display: flex;
        }

        #main-menu {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            background: radial-gradient(circle at 50% 50%, #0a0a15 0%, #030307 100%);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s;
        }

        .sidebar {
            width: 320px;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(50px);
            border-right: 1px solid var(--border);
            z-index: 2;
        }

        .logo-main {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 50px;
            text-align: center;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 24px;
            border-radius: 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            color: #777;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }

        .nav-item:hover, .nav-item.active {
            background: var(--accent);
            color: #000;
            transform: scale(1.05) translateX(10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        #song-selection {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 60px;
            overflow: hidden;
        }

        .selection-header {
            margin-bottom: 40px;
        }

        .selection-header h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            overflow-y: auto;
            padding: 10px 20px 40px 0;
        }

        .song-grid::-webkit-scrollbar { width: 4px; }
        .song-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .song-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .song-card:hover {
            background: var(--glass-hover);
            border-color: rgba(255,255,255,0.4);
            transform: translateY(-8px);
        }

        .song-visual {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.05);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .song-visual svg { width: 28px; height: 28px; fill: #fff; }

        .song-info h3 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
        .song-info p { color: #666; font-size: 0.95rem; }

        .tag-row { display: flex; gap: 8px; margin-top: 10px; }
        .tag { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }

        .song-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        .best-score { font-weight: 700; font-size: 0.9rem; }
        .best-score.grade-S { color: var(--k3); }
        .best-score.grade-A { color: var(--k2); }
        .best-score.grade-B { color: var(--k4); }

        #game-canvas {
            display: none;
            width: 100%;
            height: 100%;
            position: fixed;
            inset: 0;
            background: #000;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s;
        }

        .track-container {
            position: relative;
            width: 500px;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.01), rgba(255,255,255,0.03));
            border-left: 2px solid var(--border);
            border-right: 2px solid var(--border);
            display: flex;
            justify-content: space-around;
        }

        .lane-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(255,255,255,0.05);
        }

        .hit-zone {
            position: absolute;
            bottom: 80px;
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
            z-index: 100;
        }

        .target-slot {
            width: 85px;
            height: 85px;
            border: 4px solid var(--border);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.4);
            transition: all 0.08s;
        }

        .target-slot svg { width: 35px; height: 35px; fill: rgba(255,255,255,0.15); transition: 0.2s; }

        #slot-0 { border-color: rgba(255, 62, 62, 0.2); }
        #slot-1 { border-color: rgba(62, 100, 255, 0.2); }
        #slot-2 { border-color: rgba(46, 204, 113, 0.2); }
        #slot-3 { border-color: rgba(241, 196, 15, 0.2); }

        .target-slot.active { transform: scale(0.9); border-width: 6px; border-color: #fff; }
        .target-slot.active svg { fill: #fff; filter: drop-shadow(0 0 10px #fff); }

        .note {
            position: absolute;
            width: 75px;
            height: 75px;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            z-index: 50;
            transform: translateY(-100px);
            will-change: transform;
        }

        .note svg { width: 40px; height: 40px; fill: #000; }

        .ui-panel {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 150;
        }

        #combo-count { font-size: 6rem; font-weight: 700; opacity: 0.1; line-height: 1; }
        #rating-text { font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 8px; margin-top: 10px; }

        .header-game {
            position: absolute;
            top: 30px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 160;
        }

        #progress-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.05);
        }

        #progress-fill { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 15px #fff; }

        .lives-box { display: flex; gap: 10px; }
        .heart { width: 35px; height: 35px; fill: var(--k1); transition: 0.3s; }

        #results-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 5000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .results-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 60px;
            border-radius: 40px;
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        .rank-large {
            font-size: 10rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 0 0 50px currentColor;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        .stat-box {
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .stat-box label { display: block; font-size: 0.8rem; color: #666; text-transform: uppercase; margin-bottom: 8px; }
        .stat-box span { font-size: 1.8rem; font-weight: 700; }

        .action-btns { display: flex; gap: 20px; width: 100%; }
        .btn-action {
            flex: 1;
            padding: 20px;
            border-radius: 20px;
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary { background: #fff; color: #000; }
        .btn-secondary { background: var(--glass); color: #fff; border: 1px solid var(--border); }

        #settings-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            z-index: 6000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .settings-content {
            background: #0a0a0a;
            width: 90%;
            max-width: 450px;
            padding: 40px;
            border-radius: 35px;
            border: 1px solid var(--border);
        }

        .key-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; }
        .key-cap {
            background: var(--glass);
            height: 70px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 1.5rem;
            border: 2px solid var(--border);
            cursor: pointer;
        }

        .key-cap.binding { border-color: #fff; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0px #fff; }
            50% { box-shadow: 0 0 20px #fff; }
            100% { box-shadow: 0 0 0px #fff; }
        }

        @media (max-width: 1024px) {
            .sidebar { width: 100px; padding: 20px 10px; }
            .logo-main { font-size: 1.5rem; }
            .nav-item span { display: none; }
            .track-container { width: 100%; border: none; }
            .target-slot { width: 20vw; height: 20vw; }
            .note { width: 18vw; height: 18vw; }
        }
    </style>
</head>
<body>

    <audio id="player" crossorigin="anonymous"></audio>

    <div id="main-menu">
        <div class="sidebar">
            <h1 class="logo-main">O.</h1>
            <div class="nav-menu">
                <div class="nav-item active">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> <span>Play</span>
                </div>
                <div class="nav-item" onclick="toggleSettings(true)">
                    <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg> <span>Ajustes</span>
                </div>
            </div>
        </div>

        <div id="song-selection">
            <div class="selection-header">
                <h2>Rhythm Library</h2>
                <p>Elige una pista y domina el beat</p>
            </div>
            <div class="song-grid" id="grid"></div>
        </div>
    </div>

    <div id="game-canvas">
        <div id="progress-wrapper"><div id="progress-fill"></div></div>
        <div class="header-game">
            <div class="lives-box" id="lives-display"></div>
            <div style="font-weight: 700; font-size: 1.5rem;" id="score-live">000000</div>
        </div>
        
        <div class="ui-panel">
            <div id="combo-count">0</div>
            <div id="rating-text">READY</div>
        </div>

        <div class="track-container" id="track">
            <div class="lane-line" style="left: 25%"></div>
            <div class="lane-line" style="left: 50%"></div>
            <div class="lane-line" style="left: 75%"></div>
            
            <div class="hit-zone">
                <div class="target-slot" id="slot-0"><svg viewBox="0 0 24 24"><path d="M21 3L3 21M3 21H12M3 21V12" stroke="currentColor" stroke-width="2" fill="none"/></svg></div>
                <div class="target-slot" id="slot-1"><svg viewBox="0 0 24 24"><path d="M12 21L12 3M12 21L5 14M12 21L19 14" stroke="currentColor" stroke-width="2" fill="none"/></svg></div>
                <div class="target-slot" id="slot-2"><svg viewBox="0 0 24 24"><path d="M12 3L12 21M12 3L5 10M12 3L19 10" stroke="currentColor" stroke-width="2" fill="none"/></svg></div>
                <div class="target-slot" id="slot-3"><svg viewBox="0 0 24 24"><path d="M3 3L21 21M21 21H12M21 21V12" stroke="currentColor" stroke-width="2" fill="none"/></svg></div>
            </div>
        </div>
    </div>

    <div id="results-screen">
        <div class="results-card">
            <div id="res-rank" class="rank-large">S</div>
            <h2 id="res-song-name">Song Name</h2>
            <div class="stats-grid">
                <div class="stat-box"><label>Puntuación</label><span id="res-score">0</span></div>
                <div class="stat-box"><label>Combo Máx</label><span id="res-combo">0</span></div>
                <div class="stat-box"><label>Perfectos</label><span id="res-perfect">0</span></div>
                <div class="stat-box"><label>Fallos</label><span id="res-miss">0</span></div>
            </div>
            <div class="action-btns">
                <button class="btn-action btn-secondary" onclick="location.reload()">Menu</button>
                <button class="btn-action btn-primary" onclick="restartLevel()">Reiniciar</button>
            </div>
        </div>
    </div>

    <div id="settings-modal">
        <div class="settings-content">
            <h2 style="margin-bottom: 20px;">Configuración</h2>
            <label style="color: #666; font-size: 0.9rem;">Mapeo de Teclas</label>
            <div class="key-row">
                <div class="key-cap" id="cap-0" onclick="startBinding(0)">A</div>
                <div class="key-cap" id="cap-1" onclick="startBinding(1)">S</div>
                <div class="key-cap" id="cap-2" onclick="startBinding(2)">K</div>
                <div class="key-cap" id="cap-3" onclick="startBinding(3)">L</div>
            </div>
            <button class="btn-action btn-primary" style="width: 100%;" onclick="toggleSettings(false)">Cerrar</button>
        </div>
    </div>

    <script>
        const songs = [
            { id: 1, name: "Puertas", artist: "Cuarteto de Nos", file: "music/puertas.mp3", bpm: 120, diff: 1.8 },
            { id: 2, name: "Everything Black", artist: "Unlike Pluto", file: "music/unlike.mp3", bpm: 126, diff: 2.0 },
            { id: 3, name: "Chop Suey!", artist: "S.O.A.D", file: "music/system.mp3", bpm: 127, diff: 2.5 },
            { id: 4, name: "Art of Guitar", artist: "Marcin", file: "music/marcin.mp3", bpm: 140, diff: 3.0 },
            { id: 5, name: "Trato de no trabarme", artist: "Big Metra", file: "music/bigmetra2.mp3", bpm: 160, diff: 4.5 }
        ];

        let keys = ['a', 's', 'k', 'l'];
        let bindingIndex = -1;
        let currentSong = null;
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let perfects = 0;
        let misses = 0;
        let lives = 5;
        let gameActive = false;
        let notes = [];
        let lastSpawn = 0;
        
        const audio = document.getElementById('player');
        const grid = document.getElementById('grid');
        const canvas = document.getElementById('game-canvas');
        
        function init() {
            const savedKeys = localStorage.getItem('okao_keys');
            if(savedKeys) {
                keys = JSON.parse(savedKeys);
                keys.forEach((k, i) => document.getElementById(`cap-${i}`).textContent = k.toUpperCase());
            }
            renderSongs();
        }

        function renderSongs() {
            grid.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('okao_scores') || '{}');
            
            songs.forEach(song => {
                const data = history[song.id];
                const card = document.createElement('div');
                card.className = 'song-card';
                card.onclick = () => startSong(song);
                
                card.innerHTML = `
                    <div class="song-visual"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
                    <div class="song-info">
                        <h3>${song.name}</h3>
                        <p>${song.artist}</p>
                    </div>
                    <div class="song-meta">
                        <span class="best-score grade-${data?.rank || ''}">${data ? data.rank + ' ' + data.score : 'SIN RÉCORD'}</span>
                        <span style="color: #444; font-weight: 700;">LV.${Math.floor(song.diff * 2)}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleSettings(show) {
            document.getElementById('settings-modal').style.display = show ? 'flex' : 'none';
        }

        function startBinding(index) {
            bindingIndex = index;
            document.querySelectorAll('.key-cap').forEach(c => c.classList.remove('binding'));
            document.getElementById(`cap-${index}`).classList.add('binding');
        }

        window.addEventListener('keydown', (e) => {
            if(bindingIndex !== -1) {
                keys[bindingIndex] = e.key.toLowerCase();
                document.getElementById(`cap-${bindingIndex}`).textContent = e.key.toUpperCase();
                document.getElementById(`cap-${bindingIndex}`).classList.remove('binding');
                bindingIndex = -1;
                localStorage.setItem('okao_keys', JSON.stringify(keys));
                return;
            }

            if(!gameActive) return;
            const idx = keys.indexOf(e.key.toLowerCase());
            if(idx !== -1) handleInput(idx);
        });

        function startSong(song) {
            currentSong = song;
            document.getElementById('main-menu').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('main-menu').style.display = 'none';
                canvas.style.display = 'flex';
                setTimeout(() => canvas.style.opacity = '1', 50);
                resetGameState();
                audio.src = song.file;
                audio.play();
                gameActive = true;
                requestAnimationFrame(gameLoop);
            }, 600);
        }

        function resetGameState() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            perfects = 0;
            misses = 0;
            lives = 5;
            notes = [];
            document.getElementById('score-live').textContent = '000000';
            document.getElementById('combo-count').textContent = '0';
            updateLivesUI();
        }

        function updateLivesUI() {
            const container = document.getElementById('lives-display');
            container.innerHTML = '';
            for(let i=0; i<lives; i++) {
                container.innerHTML += `<svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
            }
        }

        function spawnNote() {
            const lane = Math.floor(Math.random() * 4);
            const noteEl = document.createElement('div');
            noteEl.className = 'note';
            noteEl.style.left = (lane * 25) + 3 + '%';
            
            const colors = ['var(--k1)', 'var(--k2)', 'var(--k3)', 'var(--k4)'];
            noteEl.style.background = colors[lane];
            noteEl.innerHTML = document.getElementById(`slot-${lane}`).innerHTML;
            
            document.getElementById('track').appendChild(noteEl);
            notes.push({ el: noteEl, lane: lane, y: -100, hit: false });
        }

        function gameLoop(time) {
            if(!gameActive) return;

            const spawnRate = 60000 / (currentSong.bpm * currentSong.diff);
            if(time - lastSpawn > spawnRate) {
                spawnNote();
                lastSpawn = time;
            }

            const speed = 8 * currentSong.diff;
            const hitZoneY = window.innerHeight - 150;

            for(let i = notes.length - 1; i >= 0; i--) {
                const n = notes[i];
                n.y += speed;
                n.el.style.transform = `translateY(${n.y}px)`;

                if(n.y > window.innerHeight) {
                    if(!n.hit) handleMiss();
                    n.el.remove();
                    notes.splice(i, 1);
                }
            }

            document.getElementById('progress-fill').style.width = (audio.currentTime / audio.duration * 100) + '%';
            
            if(audio.ended) endGame();
            if(gameActive) requestAnimationFrame(gameLoop);
        }

        function handleInput(lane) {
            const slot = document.getElementById(`slot-${lane}`);
            slot.classList.add('active');
            setTimeout(() => slot.classList.remove('active'), 100);

            const hitZoneY = window.innerHeight - 140;
            let caught = false;

            for(let i = 0; i < notes.length; i++) {
                const n = notes[i];
                if(n.lane === lane && !n.hit) {
                    const diff = Math.abs(n.y - hitZoneY);
                    if(diff < 80) {
                        caught = true;
                        n.hit = true;
                        n.el.style.opacity = '0';
                        processHit(diff);
                        break;
                    }
                }
            }
            if(!caught) handleMiss();
        }

        function processHit(diff) {
            combo++;
            if(combo > maxCombo) maxCombo = combo;
            
            let points = 0;
            let rating = "";
            let color = "";

            if(diff < 25) {
                points = 1000;
                perfects++;
                rating = "PERFECT";
                color = "#00ffcc";
            } else if(diff < 50) {
                points = 500;
                rating = "GOOD";
                color = "#2ecc71";
            } else {
                points = 200;
                rating = "OK";
                color = "#f1c40f";
            }

            score += points + (combo * 10);
            updateUI(rating, color);
        }

        function handleMiss() {
            combo = 0;
            misses++;
            lives--;
            updateLivesUI();
            updateUI("MISS", "#ff3e3e");
            if(lives <= 0) endGame(true);
        }

        function updateUI(text, color) {
            document.getElementById('score-live').textContent = score.toString().padStart(6, '0');
            document.getElementById('combo-count').textContent = combo;
            const rt = document.getElementById('rating-text');
            rt.textContent = text;
            rt.style.color = color;
            rt.style.opacity = '1';
            setTimeout(() => rt.style.opacity = '0.3', 200);
        }

        function endGame(failed = false) {
            gameActive = false;
            audio.pause();
            
            const acc = (perfects / (perfects + misses || 1)) * 100;
            let rank = "F";
            if(!failed) {
                if(acc > 98) rank = "SS";
                else if(acc > 92) rank = "S";
                else if(acc > 85) rank = "A";
                else if(acc > 70) rank = "B";
                else rank = "C";
            }

            document.getElementById('res-rank').textContent = rank;
            document.getElementById('res-rank').style.color = rank === 'S' || rank === 'SS' ? 'var(--k4)' : 'white';
            document.getElementById('res-song-name').textContent = currentSong.name;
            document.getElementById('res-score').textContent = score;
            document.getElementById('res-combo').textContent = maxCombo;
            document.getElementById('res-perfect').textContent = perfects;
            document.getElementById('res-miss').textContent = misses;
            
            const history = JSON.parse(localStorage.getItem('okao_scores') || '{}');
            if(!history[currentSong.id] || score > history[currentSong.id].score) {
                history[currentSong.id] = { score, rank };
                localStorage.setItem('okao_scores', JSON.stringify(history));
            }

            document.getElementById('results-screen').style.display = 'flex';
        }

        function restartLevel() {
            document.getElementById('results-screen').style.display = 'none';
            startSong(currentSong);
        }

        init();
    </script>
</body>
</html>
