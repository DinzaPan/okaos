<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKAOs - Rhythm Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        :root {
            --bg: #030308;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --k1: #ff4757;
            --k2: #3742fa;
            --k3: #2ed573;
            --k4: #eab000;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at 50% 50%, #111125 0%, #030308 100%);
            color: white;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .center-bg {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 20rem;
            font-weight: 700;
            opacity: 0.02;
            pointer-events: none;
            letter-spacing: -10px;
        }

        #main-ui {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
        }

        #left-bar-container {
            position: fixed;
            left: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .menu-bar {
            background: linear-gradient(90deg, var(--glass) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid var(--border);
            border-left: none;
            padding: 22px 60px 22px 40px;
            width: 300px;
            border-radius: 0 50px 50px 0;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            transform: translateX(-100%);
            animation: bounceInLeft 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .menu-bar:hover {
            background: var(--accent);
            color: #000;
            width: 340px;
        }

        #right-song-container {
            position: fixed;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            height: 85vh;
            overflow-y: auto;
            padding: 20px 0 20px 0;
            scrollbar-width: none;
            touch-action: pan-y;
            align-items: flex-end;
        }

        #right-song-container::-webkit-scrollbar { display: none; }

        .song-bar {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-right: none;
            padding: 30px 40px 30px 80px;
            width: 580px;
            border-radius: 80px 0 0 80px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            transform: translateX(0);
            animation: bounceInRight 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            backdrop-filter: blur(10px);
            margin-right: 0;
        }

        .song-bar:hover, .song-bar.selected {
            background: rgba(255, 255, 255, 0.1);
            width: 660px;
            border-color: rgba(255, 255, 255, 0.5);
        }

        .disc-wrap {
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .disc-svg {
            width: 45px;
            height: 45px;
            fill: #fff;
            animation: spin 4s linear infinite;
        }

        .song-info { text-align: right; }
        .song-info h3 { font-size: 1.8rem; margin-bottom: 5px; }
        .song-info p { font-size: 1.1rem; opacity: 0.7; }

        .diff-badge {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-top: 8px;
            display: inline-block;
        }

        @keyframes bounceInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes bounceInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #overlay-settings {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .settings-card {
            background: #0d0d15;
            padding: 40px;
            border-radius: 40px;
            border: 1px solid var(--border);
            width: 550px;
            text-align: center;
        }

        .key-config-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .key-input {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 15px 0;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            color: #fff;
            text-transform: uppercase;
        }

        .key-input.waiting {
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: #fff;
            color: #000;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .action-btn:active { transform: scale(0.95); }
        .action-btn.secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--border); }

        #intro-layer {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .intro-hearts { display: flex; gap: 20px; margin-bottom: 30px; }

        .intro-heart {
            width: 60px;
            height: 60px;
            fill: #ff4757;
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .intro-text {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        #game-canvas {
            display: none;
            width: 100%;
            height: 100%;
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0a0a15 0%, #000 100%);
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s;
            z-index: 500;
        }

        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            z-index: 60;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            transition: width 0.1s linear;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 50;
        }

        .lives-container { display: flex; gap: 8px; }
        .life-heart { width: 30px; height: 30px; fill: #ff4757; transition: opacity 0.3s, transform 0.3s; }

        .pause-trigger {
            width: 45px;
            height: 45px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .pause-trigger svg { width: 24px; height: 24px; fill: white; }

        .game-track {
            position: relative;
            width: 450px;
            height: 100%;
            background: rgba(255,255,255,0.01);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .hit-bar {
            position: absolute;
            bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 0 15px;
        }

        .slot {
            width: 75px;
            height: 75px;
            border: 3px solid var(--border);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.03);
            transition: all 0.05s;
        }

        #s0 { border-color: var(--k1); }
        #s1 { border-color: var(--k2); }
        #s2 { border-color: var(--k3); }
        #s3 { border-color: var(--k4); }

        #s0.pressed { background: var(--k1) !important; box-shadow: 0 0 20px var(--k1); border-color: #fff; }
        #s1.pressed { background: var(--k2) !important; box-shadow: 0 0 20px var(--k2); border-color: #fff; }
        #s2.pressed { background: var(--k3) !important; box-shadow: 0 0 20px var(--k3); border-color: #fff; }
        #s3.pressed { background: var(--k4) !important; box-shadow: 0 0 20px var(--k4); border-color: #fff; }

        .slot svg { width: 40px; height: 40px; fill: white; opacity: 0.8; pointer-events: none; }

        .note {
            position: absolute;
            width: 75px;
            height: 75px;
            background: #fff;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 10;
        }

        .note[data-lane="0"] { border: 3px solid var(--k1); }
        .note[data-lane="1"] { border: 3px solid var(--k2); }
        .note[data-lane="2"] { border: 3px solid var(--k3); }
        .note[data-lane="3"] { border: 3px solid var(--k4); }
        .note svg { width: 40px; height: 40px; fill: #000; }

        .ui-container {
            position: absolute;
            top: 25%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            width: 100%;
        }

        #combo-text { font-size: 4rem; font-weight: 700; color: rgba(255,255,255,0.1); }
        #status-text { font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 5px; opacity: 0; }

        #overlay-game {
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .results-panel {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            width: 450px;
            text-align: center;
        }

        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .res-item { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
        .res-item span { display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .res-item b { font-size: 1.5rem; color: #fff; }
        
        .star-display { font-size: 4rem; margin-bottom: 10px; display: flex; justify-content: center; gap: 10px; }
        .star { color: rgba(255, 255, 255, 0.1); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .star.active { color: #ffd700; text-shadow: 0 0 30px #ffd700; }

        @keyframes noteFall {
            from { transform: translateY(-100px); }
            to { transform: translateY(calc(100vh + 100px)); }
        }
    </style>
</head>
<body>
    <audio id="game-audio" preload="auto" crossorigin="anonymous"></audio>
    <div class="center-bg">OKAOs</div>
    
    <div id="main-ui">
        <div id="left-bar-container">
            <div class="menu-bar" style="animation-delay: 0.1s;" onclick="location.reload()">Inicio</div>
            <div class="menu-bar" style="animation-delay: 0.2s;">Perfil</div>
            <div class="menu-bar" style="animation-delay: 0.3s;">Misiones</div>
            <div class="menu-bar" style="animation-delay: 0.4s;" onclick="toggleSettings(true)">Ajustes</div>
        </div>
        <div id="right-song-container"></div>
    </div>

    <div id="overlay-settings">
        <div class="settings-card">
            <h2 style="margin-bottom: 10px;">Ajustes</h2>
            <p style="color:#888; font-size:0.9rem; margin-bottom:20px;">Haz clic para cambiar una tecla</p>
            <div class="key-config-grid">
                <div class="key-input" id="cfg-0" onclick="startKeyCapture(0)">A</div>
                <div class="key-input" id="cfg-1" onclick="startKeyCapture(1)">S</div>
                <div class="key-input" id="cfg-2" onclick="startKeyCapture(2)">K</div>
                <div class="key-input" id="cfg-3" onclick="startKeyCapture(3)">L</div>
            </div>
            <div style="margin-bottom: 30px;">
                <p style="color:#888; margin-bottom:10px;">Volumen Maestro</p>
                <input type="range" id="vol-range" min="0" max="1" step="0.1" value="1" style="width:100%;">
            </div>
            <button class="action-btn" onclick="saveAndCloseSettings()">GUARDAR CONFIGURACIÓN</button>
        </div>
    </div>

    <div id="intro-layer">
        <div class="intro-hearts">
            <svg id="ih1" class="intro-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <svg id="ih2" class="intro-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <svg id="ih3" class="intro-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </div>
        <div id="intro-msg" class="intro-text"></div>
    </div>

    <div id="game-canvas">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div class="top-bar">
            <div class="lives-container" id="lives-ui">
                <svg id="life-0" class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg id="life-1" class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg id="life-2" class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
            <div class="pause-trigger" onclick="togglePause()"><svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></div>
        </div>
        <div class="ui-container">
            <div id="combo-text">0</div>
            <div id="status-text">Perfect</div>
        </div>
        <div class="game-track" id="track">
            <div class="hit-bar">
                <div class="slot" id="s0"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" /></svg></div>
                <div class="slot" id="s1"><svg viewBox="0 0 24 24"><path d="M20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.58-5.59L4 12l8 8 8-8z" /></svg></div>
                <div class="slot" id="s2"><svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z" /></svg></div>
                <div class="slot" id="s3"><svg viewBox="0 0 24 24"><path d="M4 11h12.17l-5.58-5.59L12 4l8 8-8 8-1.41-1.41L16.17 13H4v-2z" /></svg></div>
            </div>
        </div>
    </div>

    <div id="overlay-game">
        <h2 id="overlay-title" style="font-size:3rem; margin-bottom:20px;">PAUSA</h2>
        <div id="results-container" style="display:none;">
            <div class="results-panel">
                <div class="star-display" id="res-stars">
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">★</span>
                </div>
                <div class="results-grid">
                    <div class="res-item"><span>Puntos</span><b id="res-score">0</b></div>
                    <div class="res-item"><span>Combo Máx.</span><b id="res-combo">0</b></div>
                    <div class="res-item"><span>Perfect</span><b id="res-perfect">0</b></div>
                    <div class="res-item"><span>Fallos</span><b id="res-miss">0</b></div>
                </div>
            </div>
        </div>
        <div style="width: 450px; display: flex; flex-direction: column; gap: 10px;">
            <button class="action-btn" id="resume-btn" onclick="togglePause()">REANUDAR (ESC)</button>
            <button class="action-btn" id="restart-btn" onclick="restartSong()">REINICIAR (ENTER)</button>
            <button class="action-btn secondary" onclick="location.reload()">VOLVER AL INICIO</button>
        </div>
    </div>

    <script>
        const songs = [
            { id: 0, name: "Puertas", artist: "El Cuarteto de Nos", path: "music/puertas.mp3", duration: 228, diff: 180, speed: 2.2 },
            { id: 1, name: "ART OF GUITAR", artist: "Marcin, RJ Pasin", path: "music/marcin.mp3", duration: 143, diff: 155, speed: 1.8 },
            { id: 2, name: "Everything Black", artist: "Unlike Pluto", path: "music/unlike.mp3", duration: 229, diff: 180, speed: 2.1 },
            { id: 3, name: "Chop Suey!", artist: "System Of A Down", path: "music/system.mp3", duration: 208, diff: 170, speed: 1.6 },
            { id: 4, name: "Adoウタカタララバイ", artist: "Ado", path: "music/onepiece.mp3", duration: 193, diff: 135, speed: 1.9 },
            { id: 5, name: "Pañuelito Rojo", artist: "Big Metra", path: "music/bigmetra.mp3", duration: 216, diff: 110, speed: 1.4 },
            { id: 6, name: "Trato de no trabarme", artist: "Big Metra", path: "music/bigmetra2.mp3", duration: 228, diff: 75, death: true, speed: 1.2 },
            { id: 7, name: "Puppet vs Tails Doll", artist: "Kronno Zomber", path: "music/puppet.mp3", duration: 285, diff: 130, speed: 2.0 },
            { id: 8, name: "AiAiA", artist: "Ado", path: "music/aiaia.mp3", duration: 259, diff: 145, speed: 2.1 }
        ];

        const arrowSvgs = [
            '<svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" /></svg>',
            '<svg viewBox="0 0 24 24"><path d="M20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.58-5.59L4 12l8 8 8-8z" /></svg>',
            '<svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z" /></svg>',
            '<svg viewBox="0 0 24 24"><path d="M4 11h12.17l-5.58-5.59L12 4l8 8-8 8-1.41-1.41L16.17 13H4v-2z" /></svg>'
        ];

        let gameKeys = ['a', 's', 'k', 'l'];
        let captureIndex = -1;
        let selectedSongIndex = 0;
        let combo = 0, maxCombo = 0, score = 0, perfects = 0, misses = 0, lives = 3, initialLives = 3;
        let isPaused = false, isDead = false, analyzerActive = false;
        let activeNotes = [];
        let audioCtx, analyzer, dataArray, source, lastBeatTime = 0;
        let currentDynamicSpeed = 2.0;
        const audio = document.getElementById('game-audio');

        function loadSavedSettings() {
            const savedKeys = localStorage.getItem('okao_keys');
            const savedVol = localStorage.getItem('okao_vol');
            if (savedKeys) {
                gameKeys = JSON.parse(savedKeys);
                gameKeys.forEach((k, i) => document.getElementById(`cfg-${i}`).textContent = k);
            }
            if (savedVol) {
                audio.volume = savedVol;
                document.getElementById('vol-range').value = savedVol;
            }
        }

        function saveAndCloseSettings() {
            localStorage.setItem('okao_keys', JSON.stringify(gameKeys));
            localStorage.setItem('okao_vol', audio.volume);
            toggleSettings(false);
        }

        function initSongList() {
            const container = document.getElementById('right-song-container');
            songs.forEach((s, i) => {
                const diffLabel = s.death ? "LEGEND" : (s.diff < 100 ? "HARD" : s.diff < 150 ? "NORMAL" : "EASY");
                const bar = document.createElement('div');
                bar.className = 'song-bar';
                bar.id = `song-bar-${i}`;
                bar.style.animationDelay = `${0.5 + (i * 0.1)}s`;
                bar.onclick = () => startSequence(i);
                bar.innerHTML = `
                    <div class="disc-wrap">
                        <svg class="disc-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
                    </div>
                    <div class="song-info">
                        <h3>${s.name}</h3>
                        <p>${s.artist}</p>
                        <span class="diff-badge">${diffLabel} • LVL ${Math.floor((200-s.diff)/10)}</span>
                    </div>
                `;
                container.appendChild(bar);
            });
        }

        function toggleSettings(s) { document.getElementById('overlay-settings').style.display = s ? 'flex' : 'none'; }

        function startKeyCapture(index) {
            captureIndex = index;
            document.querySelectorAll('.key-input').forEach(el => el.classList.remove('waiting'));
            const target = document.getElementById(`cfg-${index}`);
            target.classList.add('waiting');
            target.textContent = "...";
        }

        async function startSequence(index) {
            selectedSongIndex = index;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            if (!source) {
                source = audioCtx.createMediaElementSource(audio);
                analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 256;
                analyzer.smoothingTimeConstant = 0.8;
                source.connect(analyzer);
                analyzer.connect(audioCtx.destination);
                dataArray = new Uint8Array(analyzer.frequencyBinCount);
            }
            audio.src = songs[index].path;
            audio.load();
            const ui = document.getElementById('main-ui');
            ui.style.opacity = '0';
            ui.style.transform = 'scale(1.1)';
            setTimeout(() => {
                ui.style.display = 'none';
                document.getElementById('intro-layer').style.display = 'flex';
                runIntro();
            }, 600);
        }

        async function runIntro() {
            const h = [document.getElementById('ih1'), document.getElementById('ih2'), document.getElementById('ih3')];
            const msg = document.getElementById('intro-msg');
            const wait = ms => new Promise(r => setTimeout(r, ms));
            for(let i=0; i<3; i++) { h[i].style.opacity = '1'; h[i].style.transform = 'scale(1.2)'; await wait(500); }
            h.forEach(x => x.style.opacity = '0'); await wait(300);
            msg.textContent = "¿LISTO?"; msg.style.opacity = '1'; await wait(800);
            msg.textContent = "¡GO!"; await wait(600);
            document.getElementById('intro-layer').style.display = 'none';
            document.getElementById('game-canvas').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('game-canvas').style.opacity = '1';
                initGame();
                audio.play();
                analyzerActive = true;
                analyzeLoop();
            }, 50);
        }

        function initGame() {
            const song = songs[selectedSongIndex];
            if (song.id === 6) {
                song.speed = 1.0;
                song.diff = 60;
            }
            isDead = false; isPaused = false;
            lives = song.death ? 1 : 3;
            initialLives = lives;
            combo = 0; score = 0; perfects = 0; misses = 0; maxCombo = 0;
            lastBeatTime = 0;
            activeNotes = [];
            currentDynamicSpeed = song.speed;
            document.getElementById('track').querySelectorAll('.note').forEach(n => n.remove());
            document.getElementById('combo-text').textContent = "0";
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('overlay-game').style.display = 'none';
            document.getElementById('results-container').style.display = 'none';
            document.getElementById('resume-btn').style.display = 'block';
            updateLivesUI();
        }

        function analyzeLoop() {
            if (!analyzerActive || isDead || isPaused) return;
            requestAnimationFrame(analyzeLoop);
            analyzer.getByteFrequencyData(dataArray);
            
            let energy = 0;
            for(let i = 0; i < 8; i++) energy += dataArray[i];
            let bass = energy / 8;

            let midEnergy = 0;
            for(let i = 8; i < 16; i++) midEnergy += dataArray[i];
            let mids = midEnergy / 8;

            const song = songs[selectedSongIndex];
            
            let targetSpeed = song.speed;
            if (mids > 180) targetSpeed = song.speed * 1.5;
            else if (mids < 60) targetSpeed = song.speed * 0.8;
            else targetSpeed = song.speed * (0.8 + (mids / 255));
            
            currentDynamicSpeed = targetSpeed;

            const now = Date.now();
            const cooldown = song.death ? 110 : Math.max(140, 280 - (bass * 0.8));
            
            if (bass > song.diff && (now - lastBeatTime) > cooldown) {
                lastBeatTime = now;
                spawnNote(Math.floor(Math.random() * 4));
            }
        }

        function spawnNote(lane) {
            const track = document.getElementById('track');
            const n = document.createElement('div');
            n.className = 'note';
            n.setAttribute('data-lane', lane);
            n.innerHTML = arrowSvgs[lane];
            const slot = document.getElementById(`s${lane}`);
            n.style.left = slot.offsetLeft + 'px';
            n.style.animation = `noteFall ${currentDynamicSpeed}s linear forwards`;
            track.appendChild(n);
            const obj = { el: n, lane, hit: false, id: Math.random() };
            activeNotes.push(obj);
            n.addEventListener('animationend', () => {
                if(!obj.hit && !isPaused && !isDead) loseLife();
                n.remove();
                activeNotes = activeNotes.filter(x => x.id !== obj.id);
            });
        }

        function handleInput(lane) {
            if(isPaused || isDead) return;
            const s = document.getElementById(`s${lane}`);
            s.classList.add('pressed'); setTimeout(() => s.classList.remove('pressed'), 70);
            const sRect = s.getBoundingClientRect();
            const sY = sRect.top + 37;
            const sX = sRect.left + 37;
            
            let targetNote = null;
            let minDistance = Infinity;

            for(let n of activeNotes) {
                if(!n.hit && n.lane === lane) {
                    const nRect = n.el.getBoundingClientRect();
                    const nY = nRect.top + 37;
                    const nX = nRect.left + 37;
                    const distY = Math.abs(nY - sY);
                    const distX = Math.abs(nX - sX);

                    if(distY < 85 && distX < 40) {
                        if (distY < minDistance) {
                            minDistance = distY;
                            targetNote = n;
                        }
                    }
                }
            }

            if(targetNote) {
                targetNote.hit = true;
                targetNote.el.remove();
                combo++;
                if(combo > maxCombo) maxCombo = combo;
                perfects++;
                score += (100 * (1 + combo * 0.05));
                updateStatus('Perfect', '#00ffcc');
            } else {
                loseLife();
            }
            
            document.getElementById('combo-text').textContent = combo;
        }

        function loseLife() {
            lives--; misses++; combo = 0;
            updateLivesUI();
            updateStatus('Miss', '#ff4757');
            if(lives <= 0) endGame(false);
        }

        function updateLivesUI() {
            for(let i=0; i<3; i++) document.getElementById(`life-${i}`).style.opacity = i < lives ? '1' : '0.1';
        }

        function updateStatus(t, c) {
            const s = document.getElementById('status-text');
            s.textContent = t; s.style.color = c; s.style.opacity = '1';
            setTimeout(() => { if(s.textContent === t) s.style.opacity = '0'; }, 500);
        }

        function togglePause() {
            if(isDead && !isPaused) return;
            isPaused = !isPaused;
            if(isPaused) { audio.pause(); document.getElementById('overlay-title').textContent = "PAUSA"; } 
            else { audio.play(); analyzeLoop(); }
            document.getElementById('overlay-game').style.display = isPaused ? 'flex' : 'none';
            activeNotes.forEach(n => n.el.style.animationPlayState = isPaused ? 'paused' : 'running');
        }

        function restartSong() {
            isDead = false; isPaused = false;
            activeNotes.forEach(n => n.el.remove());
            activeNotes = [];
            initGame();
            audio.currentTime = 0;
            audio.play();
            analyzerActive = true;
            analyzeLoop();
        }

        function endGame(win) {
            isDead = true; analyzerActive = false; audio.pause();
            document.getElementById('overlay-game').style.display = 'flex';
            document.getElementById('results-container').style.display = 'block';
            document.getElementById('resume-btn').style.display = 'none';
            document.getElementById('overlay-title').textContent = win ? "COMPLETADO" : "HAS PERDIDO";
            const stars = document.querySelectorAll('.star');
            stars.forEach(s => s.classList.remove('active'));
            if(win) {
                stars[0].classList.add('active');
                if(lives === initialLives) stars[1].classList.add('active');
                if(misses === 0) stars[2].classList.add('active');
            }
            document.getElementById('res-score').textContent = Math.floor(score);
            document.getElementById('res-combo').textContent = maxCombo;
            document.getElementById('res-perfect').textContent = perfects;
            document.getElementById('res-miss').textContent = misses;
        }

        audio.ontimeupdate = () => {
            document.getElementById('progress-bar').style.width = `${(audio.currentTime / songs[selectedSongIndex].duration) * 100}%`;
        };
        audio.onended = () => endGame(true);

        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (captureIndex !== -1) {
                gameKeys[captureIndex] = k;
                document.getElementById(`cfg-${captureIndex}`).textContent = k;
                document.getElementById(`cfg-${captureIndex}`).classList.remove('waiting');
                captureIndex = -1;
                return;
            }
            if (e.key === 'Enter' && (isPaused || isDead)) { restartSong(); return; }
            if (e.key === 'Escape' || e.code === 'Escape') { togglePause(); return; }
            const idx = gameKeys.indexOf(k);
            if(idx !== -1) handleInput(idx);
        });

        document.getElementById('vol-range').oninput = (e) => audio.volume = e.target.value;

        loadSavedSettings();
        initSongList();
    </script>
</body>
</html>
