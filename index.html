<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKAOs - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg: #020205;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at center, #0f0f1a 0%, #020205 100%);
            color: white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-title {
            font-size: 8rem;
            font-weight: 700;
            letter-spacing: -5px;
            opacity: 0.1;
            position: absolute;
            z-index: 1;
        }

        #start-menu {
            position: fixed;
            left: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .menu-item {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            transform: translateX(-200%);
            animation: bounceInLeft 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .menu-item:hover {
            background: var(--accent);
            color: #000;
            transform: scale(1.05) translateX(10px) !important;
        }

        #music-sidebar {
            position: fixed;
            right: 50px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
            z-index: 10;
        }

        .disc-container {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: spin 3s linear infinite;
        }

        .disc-container svg {
            width: 100%;
            height: 100%;
            fill: var(--accent);
        }

        .music-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            transition: 0.3s;
            transform: translateX(200%);
            animation: bounceInRight 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .music-card:hover {
            border-color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .music-card h3 { font-size: 1.2rem; }
        .music-card p { font-size: 0.9rem; color: #888; }
        .music-card .stats { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 10px;
            font-size: 0.8rem;
            color: #aaa;
        }

        @keyframes bounceInLeft {
            0% { transform: translateX(-200%); }
            60% { transform: translateX(20px); }
            100% { transform: translateX(0); }
        }

        @keyframes bounceInRight {
            0% { transform: translateX(200%); }
            60% { transform: translateX(-20px); }
            100% { transform: translateX(0); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .fade-out {
            opacity: 0;
            transition: 0.5s;
        }

        #settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .settings-card {
            background: #111;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--border);
            width: 400px;
        }

        .setting-field { margin-bottom: 20px; }
        .setting-field label { display: block; margin-bottom: 10px; color: #888; }

        .key-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .key-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
        }
        .key-box.active { border-color: #fff; }

        .btn-action {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1 class="main-title">OKAOs</h1>

    <div id="start-menu">
        <div class="menu-item" style="animation-delay: 0.1s;">Inicio</div>
        <div class="menu-item" style="animation-delay: 0.2s;">Perfil</div>
        <div class="menu-item" style="animation-delay: 0.3s;">Misiones</div>
        <div class="menu-item" style="animation-delay: 0.4s;" onclick="toggleSettings(true)">Ajustes</div>
    </div>

    <div id="music-sidebar">
        <div class="disc-container">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
        </div>
        
        <div class="music-card" style="animation-delay: 0.5s;" onclick="playMusic('music/puertas.mp3')">
            <h3>Puertas</h3>
            <p>Normal</p>
            <div class="stats">
                <span>Duración: 3:48</span>
                <span>Puntuación: 0</span>
            </div>
        </div>
    </div>

    <div id="settings-overlay">
        <div class="settings-card">
            <h2>Ajustes</h2>
            <div class="setting-field">
                <label>Volumen</label>
                <input type="range" id="vol-range" min="0" max="1" step="0.1" style="width:100%">
            </div>
            <div class="setting-field">
                <label>Controles</label>
                <div class="key-row">
                    <div class="key-box" id="k0" onclick="listenKey(0)">A</div>
                    <div class="key-box" id="k1" onclick="listenKey(1)">S</div>
                    <div class="key-box" id="k2" onclick="listenKey(2)">K</div>
                    <div class="key-box" id="k3" onclick="listenKey(3)">L</div>
                </div>
            </div>
            <button class="btn-action" style="background:#fff" onclick="saveConfig()">Guardar</button>
            <button class="btn-action" style="background:transparent; color:#fff; border:1px solid var(--border)" onclick="toggleSettings(false)">Cerrar</button>
        </div>
    </div>

    <script>
        let configKeys = ['a', 's', 'k', 'l'];
        let listening = -1;

        function loadLocal() {
            const k = localStorage.getItem('okao_keys');
            if(k) {
                configKeys = JSON.parse(k);
                configKeys.forEach((key, i) => document.getElementById(`k${i}`).textContent = key.toUpperCase());
            }
            const v = localStorage.getItem('okao_vol');
            if(v) document.getElementById('vol-range').value = v;
        }

        function playMusic(path) {
            document.body.classList.add('fade-out');
            setTimeout(() => {
                location.href = 'sc/play.html';
            }, 500);
        }

        function toggleSettings(show) {
            document.getElementById('settings-overlay').style.display = show ? 'flex' : 'none';
        }

        function listenKey(i) {
            listening = i;
            document.querySelectorAll('.key-box').forEach(b => b.classList.remove('active'));
            document.getElementById(`k${i}`).classList.add('active');
            document.getElementById(`k${i}`).textContent = "...";
        }

        window.addEventListener('keydown', (e) => {
            if(listening !== -1) {
                configKeys[listening] = e.key.toLowerCase();
                document.getElementById(`k${listening}`).textContent = e.key.toUpperCase();
                document.getElementById(`k${listening}`).classList.remove('active');
                listening = -1;
            }
        });

        function saveConfig() {
            localStorage.setItem('okao_keys', JSON.stringify(configKeys));
            localStorage.setItem('okao_vol', document.getElementById('vol-range').value);
            toggleSettings(false);
        }

        loadLocal();
    </script>
</body>
</html>
