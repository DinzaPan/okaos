<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKAOs - Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg: #05050a;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at center, #1a1a2e 0%, #05050a 100%);
            color: white;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .center-bg {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            font-weight: 700;
            opacity: 0.05;
            pointer-events: none;
        }

        #menu-container {
            position: fixed;
            left: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .menu-item {
            background: var(--glass);
            border: 1px solid var(--border);
            border-left: none;
            padding: 25px 60px 25px 40px;
            width: 350px;
            border-radius: 0 50px 50px 0;
            font-size: 1.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateX(-100%);
            animation: bounceInLeft 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .menu-item:hover {
            background: var(--accent);
            color: #000;
            width: 400px;
        }

        #song-selection {
            position: fixed;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .song-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-right: none;
            padding: 20px 40px 20px 60px;
            width: 500px;
            border-radius: 50px 0 0 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateX(100%);
            animation: bounceInRight 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .song-card:hover {
            background: rgba(255, 255, 255, 0.15);
            width: 550px;
            border-color: #fff;
        }

        .disc-icon {
            width: 60px;
            height: 60px;
            fill: #fff;
            animation: spin 4s linear infinite;
        }

        .song-details h3 { font-size: 1.4rem; }
        .song-details p { font-size: 0.9rem; color: #bbb; }

        @keyframes bounceInLeft {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(0); }
        }

        @keyframes bounceInRight {
            0% { transform: translateX(100%); }
            100% { transform: translateX(0); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #settings-layer {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .settings-box {
            background: #111;
            padding: 50px;
            border-radius: 40px;
            border: 1px solid var(--border);
            width: 450px;
        }

        input[type="range"] { width: 100%; margin: 20px 0; }
        
        .save-btn {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: #fff;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="center-bg">OKAOs</div>

    <div id="menu-container">
        <div class="menu-item" style="animation-delay: 0.1s;">Inicio</div>
        <div class="menu-item" style="animation-delay: 0.2s;">Perfil</div>
        <div class="menu-item" style="animation-delay: 0.3s;">Misiones</div>
        <div class="menu-item" style="animation-delay: 0.4s;" onclick="toggleConfig(true)">Ajustes</div>
    </div>

    <div id="song-selection">
        <div class="song-card" style="animation-delay: 0.5s;" onclick="goToPlay('Puertas', 'music/puertas.mp3')">
            <svg class="disc-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
            <div class="song-details">
                <h3>Puertas</h3>
                <p>Normal • 3:48</p>
                <p style="color: #00ff88; font-weight: 600; margin-top: 5px;">Record: 0</p>
            </div>
        </div>
    </div>

    <div id="settings-layer">
        <div class="settings-box">
            <h2>Configuración</h2>
            <div style="margin-top: 20px;">
                <label>Volumen General</label>
                <input type="range" id="vol-input" min="0" max="1" step="0.1" value="1">
            </div>
            <button class="save-btn" onclick="saveSettings()">CERRAR Y GUARDAR</button>
        </div>
    </div>

    <script>
        function goToPlay(name, file) {
            localStorage.setItem('selectedSong', file);
            localStorage.setItem('selectedName', name);
            document.body.style.opacity = '0';
            document.body.style.transition = '0.5s';
            setTimeout(() => {
                location.href = 'sc/play.html';
            }, 500);
        }

        function toggleConfig(show) {
            document.getElementById('settings-layer').style.display = show ? 'flex' : 'none';
        }

        function saveSettings() {
            localStorage.setItem('okao_vol', document.getElementById('vol-input').value);
            toggleConfig(false);
        }
    </script>
</body>
</html>
