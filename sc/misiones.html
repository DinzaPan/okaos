<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misiones - OKAOs</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg: #020205;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00b894;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--bg);
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(60, 60, 100, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(40, 40, 80, 0.15) 0%, transparent 40%);
            z-index: -1;
        }

        .sidebar {
            width: 350px;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--border);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            flex-shrink: 0;
        }

        .main-content {
            flex-grow: 1;
            height: 100%;
            overflow-y: auto;
            padding: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-small {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(180deg, #fff 0%, #777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 25px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: #aaa;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .nav-btn:hover, .nav-btn.active {
            background: white;
            color: black;
            transform: translateX(10px);
        }

        .misiones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .mision-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            position: relative;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .mision-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .mision-img {
            width: 120px;
            height: 120px;
            margin-bottom: 25px;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            transition: transform 0.4s;
        }

        .mision-card:hover .mision-img {
            transform: scale(1.1);
        }

        .mision-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #fff;
        }

        .mision-desc {
            font-size: 1rem;
            color: #888;
            line-height: 1.5;
            max-width: 200px;
        }

        .check-badge {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 184, 148, 0.4);
            z-index: 2;
        }

        .check-badge svg { width: 24px; height: 24px; fill: white; }

        .completed {
            border-color: var(--accent) !important;
            background: rgba(0, 184, 148, 0.03) !important;
        }

        .completed .check-badge { display: flex; }

        .mobile-header {
            display: none;
            width: 100%;
            padding: 20px;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        @media (max-width: 1024px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { display: none; }
            .mobile-header { display: flex; }
            .main-content { padding: 30px 20px; height: auto; }
            .misiones-grid { grid-template-columns: 1fr; }
            .mision-card { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <a href="../index.html" style="text-decoration: none; color: white; display: flex; align-items: center; gap: 8px; font-weight: 600;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Volver
        </a>
        <span style="font-weight: 700; font-size: 1.2rem;">Misiones</span>
        <div style="width: 24px;"></div>
    </div>

    <aside class="sidebar">
        <div class="logo-small">OKAOs</div>
        <nav class="nav-list">
            <a href="../index.html" class="nav-btn">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                Inicio
            </a>
            <a href="#" class="nav-btn active">
                <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                Misiones
            </a>
            <a href="#" class="nav-btn">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                Perfil
            </a>
            <a href="#" class="nav-btn">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                Ajustes
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="misiones-grid">
            <div class="mision-card" id="m1">
                <div class="check-badge"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
                <img src="../img/icons/mision1.png" alt="Misión 1" class="mision-img">
                <div class="mision-name">Misión 1</div>
                <div class="mision-desc">Pasarse el Nivel Completo.</div>
            </div>

            <div class="mision-card" id="m2">
                <div class="check-badge"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
                <img src="../img/icons/mision2.png" alt="Misión 2" class="mision-img">
                <div class="mision-name">Misión 2</div>
                <div class="mision-desc">Pasarse el Nivel Completo Full Perfect.</div>
            </div>

            <div class="mision-card" id="m3">
                <div class="check-badge"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
                <img src="../img/icons/mision3.png" alt="Misión 3" class="mision-img">
                <div class="mision-name">Misión 3</div>
                <div class="mision-desc">Pasarse el Nivel Completo sin perder ninguna vida.</div>
            </div>
        </div>
    </main>

    <script>
        function updateMissionsUI() {
            if(localStorage.getItem('mision1') === 'true') document.getElementById('m1').classList.add('completed');
            if(localStorage.getItem('mision2') === 'true') document.getElementById('m2').classList.add('completed');
            if(localStorage.getItem('mision3') === 'true') document.getElementById('m3').classList.add('completed');
        }
        updateMissionsUI();
    </script>
</body>
</html>
