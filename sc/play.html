<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKAOs - Play</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        :root {
            --bg: #020205; --accent: #ffffff; --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12); --k1: #ff4757; --k2: #3742fa; --k3: #2ed573; --k4: #eab000;
        }
        body {
            font-family: 'Fredoka', sans-serif; height: 100vh; width: 100vw;
            background: var(--bg); color: white; overflow: hidden; display: flex;
        }

        #intro-layer {
            position: fixed; inset: 0; z-index: 500; background: #000;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
        }
        .hearts-box { display: flex; gap: 20px; margin-bottom: 20px; }
        .h-icon { width: 60px; height: 60px; fill: #ff4757; opacity: 0; transform: scale(0); transition: 0.5s; }

        #game-ui { display: none; width: 100%; height: 100%; position: relative; flex-direction: column; align-items: center; }
        .game-logo { position: absolute; top: 30px; left: 30px; font-size: 2rem; font-weight: 700; }
        
        .top-right { position: absolute; top: 25px; right: 25px; display: flex; gap: 20px; align-items: center; }
        .lives { display: flex; gap: 8px; }
        .l-heart { width: 30px; height: 30px; fill: #ff4757; transition: 0.3s; }
        .p-btn { width: 45px; height: 45px; background: var(--glass); border: 1px solid var(--border); border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        .track { position: relative; width: 450px; height: 100%; border-left: 1px solid var(--border); border-right: 1px solid var(--border); background: rgba(255,255,255,0.01); }
        .hit-zone { position: absolute; bottom: 80px; width: 100%; display: flex; justify-content: center; gap: 15px; }
        .key-slot { width: 75px; height: 75px; border: 3px solid var(--border); border-radius: 20px; display: flex; justify-content: center; align-items: center; transition: 0.05s; }
        
        #s0.press { background: var(--k1); box-shadow: 0 0 20px var(--k1); border-color: #fff; }
        #s1.press { background: var(--k2); box-shadow: 0 0 20px var(--k2); border-color: #fff; }
        #s2.press { background: var(--k3); box-shadow: 0 0 20px var(--k3); border-color: #fff; }
        #s3.press { background: var(--k4); box-shadow: 0 0 20px var(--k4); border-color: #fff; }

        .falling-note { position: absolute; width: 65px; height: 65px; background: #fff; border-radius: 18px; display: flex; justify-content: center; align-items: center; z-index: 10; animation: fall 2s linear forwards; }
        @keyframes fall { from { transform: translateY(-100px); } to { transform: translateY(110vh); } }

        #pause-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
        .opt { width: 300px; padding: 20px; background: var(--glass); border: 1px solid var(--border); border-radius: 15px; text-align: center; cursor: pointer; }
        .opt:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <audio id="player"></audio>

    <div id="intro-layer">
        <div class="hearts-box">
            <svg id="ih1" class="h-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <svg id="ih2" class="h-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <svg id="ih3" class="h-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </div>
        <h1 id="imsg" style="font-size: 3rem;"></h1>
    </div>

    <div id="game-ui">
        <div class="game-logo">OKAOs</div>
        <div class="top-right">
            <div class="lives">
                <svg id="l0" class="l-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg id="l1" class="l-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg id="l2" class="l-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
            <div class="p-btn" onclick="pau()"><svg viewBox="0 0 24 24" width="24" fill="white"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></div>
        </div>

        <div class="track" id="main-track">
            <div class="hit-zone">
                <div class="key-slot" id="s0"></div>
                <div class="key-slot" id="s1"></div>
                <div class="key-slot" id="s2"></div>
                <div class="key-slot" id="s3"></div>
            </div>
        </div>
    </div>

    <div id="pause-screen">
        <h1 id="p-title">PAUSA</h1>
        <div class="opt" onclick="pau()">Continuar</div>
        <div class="opt" onclick="location.reload()">Reiniciar</div>
        <div class="opt" onclick="location.href='../index.html'">Inicio</div>
    </div>

    <script>
        const audio = document.getElementById('player');
        let keys = ['a', 's', 'k', 'l'];
        let lives = 3;
        let paused = false;
        let notes = [];
        let audioCtx, analyzer, data;

        function setup() {
            const song = JSON.parse(localStorage.getItem('currentSong'));
            if(!song) return location.href = '../index.html';
            audio.src = '../' + song.path;
            audio.volume = localStorage.getItem('okao_vol') || 1;
            runIntro();
        }

        async function runIntro() {
            const wait = ms => new Promise(r => setTimeout(r, ms));
            const msg = document.getElementById('imsg');
            for(let i=1; i<=3; i++) {
                document.getElementById('ih'+i).style.opacity = '1';
                document.getElementById('ih'+i).style.transform = 'scale(1)';
                await wait(600);
            }
            msg.textContent = "3 Vidas"; await wait(800);
            msg.textContent = "¿Listo?"; await wait(800);
            msg.textContent = "¡Go!"; await wait(600);
            document.getElementById('intro-layer').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            start();
        }

        function start() {
            audioCtx = new AudioContext();
            analyzer = audioCtx.createAnalyser();
            const src = audioCtx.createMediaElementSource(audio);
            src.connect(analyzer); analyzer.connect(audioCtx.destination);
            data = new Uint8Array(analyzer.frequencyBinCount);
            audio.play();
            loop();
        }

        function loop() {
            if(paused || lives <= 0) return;
            requestAnimationFrame(loop);
            analyzer.getByteFrequencyData(data);
            let energy = data.slice(0, 10).reduce((a,b) => a+b) / 10;
            if(energy > 150 && Math.random() > 0.9) spawn(Math.floor(Math.random()*4));
        }

        function spawn(lane) {
            const n = document.createElement('div');
            n.className = 'falling-note';
            const slot = document.getElementById('s'+lane);
            n.style.left = slot.offsetLeft + 'px';
            document.getElementById('main-track').appendChild(n);
            const obj = { el: n, lane, hit: false };
            notes.push(obj);
            n.addEventListener('animationend', () => {
                if(!obj.hit) miss();
                n.remove();
                notes = notes.filter(x => x !== obj);
            });
        }

        function miss() {
            lives--;
            for(let i=0; i<3; i++) document.getElementById('l'+i).style.opacity = i < lives ? '1' : '0.1';
            if(lives <= 0) {
                paused = true; audio.pause();
                document.getElementById('pause-screen').style.display = 'flex';
                document.getElementById('p-title').textContent = "GAME OVER";
            }
        }

        function pau() {
            paused = !paused;
            document.getElementById('pause-screen').style.display = paused ? 'flex' : 'none';
            if(paused) { audio.pause(); document.querySelectorAll('.falling-note').forEach(x => x.style.animationPlayState = 'paused'); }
            else { audio.play(); document.querySelectorAll('.falling-note').forEach(x => x.style.animationPlayState = 'running'); loop(); }
        }

        window.onkeydown = (e) => {
            const idx = keys.indexOf(e.key.toLowerCase());
            if(idx !== -1 && !paused) {
                const s = document.getElementById('s'+idx);
                s.classList.add('press'); setTimeout(() => s.classList.remove('press'), 100);
                const hit = notes.find(n => n.lane === idx && !n.hit && Math.abs(n.el.getBoundingClientRect().top - s.getBoundingClientRect().top) < 60);
                if(hit) { hit.hit = true; hit.el.style.display = 'none'; }
            }
        };

        setup();
    </script>
</body>
</html>
