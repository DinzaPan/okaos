<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKAOs - Play</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        :root {
            --bg: #020205; --accent: #ffffff; --border: rgba(255, 255, 255, 0.1);
            --k1: #ff3e3e; --k2: #3e86ff; --k3: #3eff86; --k4: #ffcc3e;
        }
        body {
            font-family: 'Fredoka', sans-serif; height: 100vh; width: 100vw;
            background: var(--bg); color: white; overflow: hidden;
        }

        #intro-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
        }
        .intro-msg { font-size: 5rem; font-weight: 700; transform: scale(0.5); opacity: 0; transition: 0.4s; }

        #ui-layer { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; position: relative; }
        
        .progress-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.1);
        }
        #progress-bar { width: 0%; height: 100%; background: #fff; transition: 0.1s linear; }

        .stats-panel { position: absolute; top: 40px; left: 40px; }
        .combo-text { font-size: 4rem; font-weight: 700; }
        .score-text { font-size: 1.5rem; opacity: 0.7; }

        .game-track {
            width: 500px; height: 100%; border-left: 2px solid var(--border); border-right: 2px solid var(--border);
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.02));
            position: relative;
        }

        .receptor-zone {
            position: absolute; bottom: 100px; width: 100%; display: flex; justify-content: center; gap: 20px;
        }
        .key-rec {
            width: 85px; height: 85px; border: 4px solid var(--border); border-radius: 25px;
            display: flex; justify-content: center; align-items: center; transition: 0.05s;
        }
        #rec0.hit { background: var(--k1); box-shadow: 0 0 40px var(--k1); border-color: #fff; }
        #rec1.hit { background: var(--k2); box-shadow: 0 0 40px var(--k2); border-color: #fff; }
        #rec2.hit { background: var(--k3); box-shadow: 0 0 40px var(--k3); border-color: #fff; }
        #rec3.hit { background: var(--k4); box-shadow: 0 0 40px var(--k4); border-color: #fff; }

        .note {
            position: absolute; width: 75px; height: 75px; background: #fff; border-radius: 20px;
            z-index: 5; animation: falling 2s linear forwards;
        }
        @keyframes falling { from { transform: translateY(-100px); } to { transform: translateY(110vh); } }

        .judgment {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.5rem; font-weight: 700; pointer-events: none; opacity: 0;
        }
        .animate-judge { animation: judgePop 0.4s ease-out; }
        @keyframes judgePop { 0% { opacity: 0; transform: translate(-50%, -20%) scale(1.5); } 50% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -80%) scale(1); } }

        #result-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
        }
        .win-btn {
            width: 300px; padding: 25px; border-radius: 20px; border: 1px solid #fff;
            background: transparent; color: white; font-size: 1.2rem; font-weight: 700; cursor: pointer;
        }
        .win-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <audio id="music-player"></audio>

    <div id="intro-screen">
        <h1 class="intro-msg" id="intro-text"></h1>
    </div>

    <div id="ui-layer">
        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <div class="stats-panel">
            <div class="score-text" id="score-val">000000</div>
            <div class="combo-text" id="combo-val">0</div>
        </div>

        <div class="game-track" id="track">
            <div class="receptor-zone">
                <div class="key-rec" id="rec0"></div>
                <div class="key-rec" id="rec1"></div>
                <div class="key-rec" id="rec2"></div>
                <div class="key-rec" id="rec3"></div>
            </div>
        </div>

        <div id="judge-text" class="judgment">PERFECT</div>
    </div>

    <div id="result-screen">
        <h1 id="res-msg" style="font-size: 4rem; margin-bottom: 20px;">¡FINISH!</h1>
        <div style="text-align: center; margin-bottom: 30px;">
            <p id="final-score" style="font-size: 2rem;"></p>
            <p id="final-combo" style="color: #aaa;"></p>
        </div>
        <button class="win-btn" onclick="location.reload()">REINTENTAR</button>
        <button class="win-btn" onclick="location.href='../index.html'">VOLVER AL INICIO</button>
    </div>

    <script>
        const audio = document.getElementById('music-player');
        const keys = ['a', 's', 'k', 'l'];
        let score = 0;
        let combo = 0;
        let activeNotes = [];
        let gameActive = false;

        async function init() {
            const songPath = localStorage.getItem('selectedSong');
            if(!songPath) return location.href = '../index.html';
            
            audio.src = '../' + songPath;
            audio.volume = localStorage.getItem('okao_vol') || 1;

            const steps = ["3", "2", "1", "¡GO!"];
            const intro = document.getElementById('intro-text');
            
            for(let s of steps) {
                intro.textContent = s;
                intro.style.opacity = '1';
                intro.style.transform = 'scale(1.2)';
                await new Promise(r => setTimeout(r, 800));
                intro.style.opacity = '0';
                intro.style.transform = 'scale(0.5)';
                await new Promise(r => setTimeout(r, 100));
            }

            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            
            audio.play();
            gameActive = true;
            gameLoop();
        }

        function gameLoop() {
            if(!gameActive) return;
            
            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';

            if(Math.random() > 0.96) spawnNote(Math.floor(Math.random() * 4));

            if(audio.ended) finishGame();
            
            requestAnimationFrame(gameLoop);
        }

        function spawnNote(lane) {
            const n = document.createElement('div');
            n.className = 'note';
            const target = document.getElementById('rec' + lane);
            n.style.left = target.offsetLeft + 'px';
            document.getElementById('track').appendChild(n);

            const noteObj = { el: n, lane: lane, hit: false };
            activeNotes.push(noteObj);

            n.addEventListener('animationend', () => {
                if(!noteObj.hit) {
                    combo = 0;
                    updateStats();
                }
                n.remove();
                activeNotes = activeNotes.filter(x => x !== noteObj);
            });
        }

        window.onkeydown = (e) => {
            if(!gameActive) return;
            const idx = keys.indexOf(e.key.toLowerCase());
            if(idx !== -1) {
                const rec = document.getElementById('rec' + idx);
                rec.classList.add('hit');
                setTimeout(() => rec.classList.remove('hit'), 100);

                const hitNote = activeNotes.find(n => n.lane === idx && !n.hit);
                if(hitNote) {
                    const rect = hitNote.el.getBoundingClientRect();
                    const recRect = rec.getBoundingClientRect();
                    const dist = Math.abs(rect.top - recRect.top);

                    if(dist < 80) {
                        hitNote.hit = true;
                        hitNote.el.style.display = 'none';
                        processHit(dist);
                    }
                }
            }
        };

        function processHit(d) {
            const judge = document.getElementById('judge-text');
            judge.classList.remove('animate-judge');
            void judge.offsetWidth; 
            
            if(d < 30) {
                judge.textContent = "PERFECT";
                judge.style.color = "#3eff86";
                score += 300;
            } else {
                judge.textContent = "COMÚN";
                judge.style.color = "#ffffff";
                score += 100;
            }
            
            combo++;
            judge.classList.add('animate-judge');
            updateStats();
        }

        function updateStats() {
            document.getElementById('score-val').textContent = score.toString().padStart(6, '0');
            document.getElementById('combo-val').textContent = combo;
        }

        function finishGame() {
            gameActive = false;
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('final-score').textContent = "Puntaje: " + score;
            document.getElementById('final-combo').textContent = "Máximo Combo: " + combo;
        }

        init();
    </script>
</body>
</html>
