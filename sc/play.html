<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKAOs - Rhythm Play</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        :root {
            --bg: #020205;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.12);
            --k1: #ff4757;
            --k2: #3742fa;
            --k3: #2ed573;
            --k4: #eab000;
        }
        body {
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            width: 100vw;
            background: var(--bg);
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        #intro-layer {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .intro-text { font-size: 5rem; font-weight: 700; transition: 0.4s; transform: scale(0.5); opacity: 0; }
        .intro-active { transform: scale(1.2); opacity: 1; }

        #game-canvas {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at center, #0a0a15 0%, #000 100%);
            flex-direction: column;
            align-items: center;
        }

        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            z-index: 60;
        }
        #progress-bar { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 15px #fff; }

        .top-bar {
            position: absolute;
            top: 25px;
            width: 100%;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }
        .lives-container { display: flex; gap: 10px; }
        .life-heart { width: 35px; height: 35px; fill: #ff4757; filter: drop-shadow(0 0 5px #ff4757); transition: 0.3s; }

        .game-track {
            position: relative;
            width: 450px;
            height: 100%;
            background: rgba(255,255,255,0.01);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .hit-bar {
            position: absolute;
            bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 0 20px;
        }
        .slot {
            width: 85px;
            height: 85px;
            border: 3px solid var(--border);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.03);
            transition: 0.05s;
        }
        .slot svg { width: 35px; height: 35px; fill: rgba(255,255,255,0.15); }

        #s0.pressed { background: var(--k1)!important; box-shadow: 0 0 30px var(--k1); border-color: #fff; }
        #s1.pressed { background: var(--k2)!important; box-shadow: 0 0 30px var(--k2); border-color: #fff; }
        #s2.pressed { background: var(--k3)!important; box-shadow: 0 0 30px var(--k3); border-color: #fff; }
        #s3.pressed { background: var(--k4)!important; box-shadow: 0 0 30px var(--k4); border-color: #fff; }

        .note {
            position: absolute;
            width: 75px;
            height: 75px;
            background: #fff;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            z-index: 10;
        }
        .note svg { width: 40px; height: 40px; fill: #000; }
        .note[data-lane="0"] { border: 4px solid var(--k1); }
        .note[data-lane="1"] { border: 4px solid var(--k2); }
        .note[data-lane="2"] { border: 4px solid var(--k3); }
        .note[data-lane="3"] { border: 4px solid var(--k4); }

        @keyframes noteFall {
            from { transform: translateY(-100px); }
            to { transform: translateY(calc(100vh + 100px)); }
        }

        .ui-stats {
            position: absolute;
            top: 30%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }
        #combo-text { font-size: 5rem; font-weight: 700; opacity: 0.1; }
        #judge-text { font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; opacity: 0; transition: 0.1s; }

        #overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .overlay-card { width: 350px; display: flex; flex-direction: column; gap: 15px; text-align: center; }
        .btn-action {
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-action:hover { background: #fff; color: #000; }
        .btn-action svg { width: 20px; height: 20px; fill: currentColor; }

        @media (max-width: 600px) {
            .game-track { width: 100%; border: none; }
            .slot { width: 21vw; height: 21vw; }
            .note { width: 18vw; height: 18vw; }
        }
    </style>
</head>
<body>

    <audio id="music-player" crossorigin="anonymous"></audio>

    <div id="intro-layer">
        <div id="intro-msg" class="intro-text"></div>
    </div>

    <div id="game-canvas">
        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <div class="top-bar">
            <div class="lives-container" id="lives-ui">
                <svg class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
            <div style="cursor: pointer" onclick="togglePause()">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
        </div>

        <div class="ui-stats">
            <div id="combo-text">0</div>
            <div id="judge-text">PERFECT</div>
        </div>

        <div class="game-track" id="track">
            <div class="hit-bar">
                <div class="slot" id="s0"><svg viewBox="0 0 24 24"><path d="M21 3L3 21M3 21H12M3 21V12" stroke="currentColor" stroke-width="2" fill="none"/></svg></div>
                <div class="slot" id="s1"><svg viewBox="0 0 24 24"><path d="M12 21L12 3M12 21L5 14M12 21L19 14" stroke="currentColor" stroke-width="2" fill="none"/></svg></div>
                <div class="slot" id="s2"><svg viewBox="0 0 24 24"><path d="M12 3L12 21M12 3L5 10M12 3L19 10" stroke="currentColor" stroke-width="2" fill="none"/></svg></div>
                <div class="slot" id="s3"><svg viewBox="0 0 24 24"><path d="M3 3L21 21M21 21H12M21 21V12" stroke="currentColor" stroke-width="2" fill="none"/></svg></div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <div class="overlay-card">
            <h1 id="overlay-title" style="font-size: 3rem; margin-bottom: 20px;">PAUSA</h1>
            <div class="btn-action" id="btn-resume" onclick="togglePause()">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> REANUDAR (Enter)
            </div>
            <div class="btn-action" onclick="location.reload()">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg> REINTENTAR
            </div>
            <div class="btn-action" onclick="location.href='../index.html'">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg> SALIR
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('music-player');
        const track = document.getElementById('track');
        const introLayer = document.getElementById('intro-layer');
        const introMsg = document.getElementById('intro-msg');
        const canvas = document.getElementById('game-canvas');
        
        let keys = ['a', 's', 'k', 'l'];
        let combo = 0;
        let lives = 3;
        let activeNotes = [];
        let isPaused = false;
        let isDead = false;
        let gameActive = false;

        let audioCtx, analyzer, dataArray, source;
        let lastBeat = 0;

        const icons = [
            '<svg viewBox="0 0 24 24"><path d="M21 3L3 21M3 21H12M3 21V12" stroke="black" stroke-width="2" fill="none"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M12 21L12 3M12 21L5 14M12 21L19 14" stroke="black" stroke-width="2" fill="none"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M12 3L12 21M12 3L5 10M12 3L19 10" stroke="black" stroke-width="2" fill="none"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M3 3L21 21M21 21H12M21 21V12" stroke="black" stroke-width="2" fill="none"/></svg>'
        ];

        async function init() {
            const savedKeys = localStorage.getItem('okao_keys');
            if(savedKeys) keys = JSON.parse(savedKeys);
            
            const songPath = localStorage.getItem('selectedSong');
            if(!songPath) return location.href = '../index.html';
            audio.src = '../' + songPath;
            audio.volume = localStorage.getItem('okao_vol') || 1;

            const countdown = ["3", "2", "1", "GO!"];
            for(let step of countdown) {
                introMsg.textContent = step;
                introMsg.classList.add('intro-active');
                await new Promise(r => setTimeout(r, 600));
                introMsg.classList.remove('intro-active');
                await new Promise(r => setTimeout(r, 100));
            }

            introLayer.style.display = 'none';
            canvas.style.display = 'flex';
            
            setupAudioContext();
            audio.play();
            gameActive = true;
            renderLoop();
        }

        function setupAudioContext() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(audio);
            analyzer = audioCtx.createAnalyser();
            analyzer.fftSize = 256;
            source.connect(analyzer);
            analyzer.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyzer.frequencyBinCount);
        }

        function renderLoop() {
            if(!gameActive || isPaused || isDead) return;

            document.getElementById('progress-bar').style.width = (audio.currentTime / audio.duration * 100) + '%';

            analyzer.getByteFrequencyData(dataArray);
            let bass = 0;
            for(let i=0; i<8; i++) bass += dataArray[i];
            bass = bass / 8;

            const now = Date.now();
            if(bass > 190 && (now - lastBeat) > 300) {
                spawnNote(Math.floor(Math.random() * 4));
                lastBeat = now;
            }

            if(audio.ended) finish("¡WINNER!");
            requestAnimationFrame(renderLoop);
        }

        function spawnNote(lane) {
            const n = document.createElement('div');
            n.className = 'note';
            n.innerHTML = icons[lane];
            n.setAttribute('data-lane', lane);
            
            const slot = document.getElementById('s' + lane);
            n.style.left = slot.offsetLeft + 'px';
            n.style.animation = `noteFall 2s linear forwards`;
            track.appendChild(n);

            const obj = { el: n, lane, hit: false, id: Math.random() };
            activeNotes.push(obj);

            n.addEventListener('animationend', () => {
                if(!obj.hit && !isPaused) loseLife();
                n.remove();
                activeNotes = activeNotes.filter(x => x.id !== obj.id);
            });
        }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if(key === 'escape') togglePause();
            if(key === 'enter' && (isPaused || isDead)) {
                if(isDead) location.reload(); else togglePause();
            }

            if(isPaused || isDead) return;

            const lane = keys.indexOf(key);
            if(lane !== -1) {
                const slot = document.getElementById('s' + lane);
                slot.classList.add('pressed');
                setTimeout(() => slot.classList.remove('pressed'), 80);

                const target = activeNotes.find(n => n.lane === lane && !n.hit);
                if(target) {
                    const nRect = target.el.getBoundingClientRect();
                    const sRect = slot.getBoundingClientRect();
                    const dist = Math.abs(nRect.top - sRect.top);

                    if(dist < 100) {
                        target.hit = true;
                        target.el.style.display = 'none';
                        if(dist < 40) {
                            combo++;
                            updateJudge("PERFECT", "#00ffcc");
                        } else {
                            combo++;
                            updateJudge("GREAT", "#ffffff");
                        }
                        document.getElementById('combo-text').textContent = combo;
                    }
                }
            }
        });

        function updateJudge(txt, col) {
            const j = document.getElementById('judge-text');
            j.textContent = txt;
            j.style.color = col;
            j.style.opacity = '1';
            setTimeout(() => j.style.opacity = '0', 400);
        }

        function loseLife() {
            lives--;
            combo = 0;
            document.getElementById('combo-text').textContent = "0";
            updateJudge("MISS", "#ff4757");
            const hearts = document.querySelectorAll('.life-heart');
            hearts.forEach((h, i) => h.style.opacity = i < lives ? '1' : '0.1');
            if(lives <= 0) finish("GAME OVER");
        }

        function togglePause() {
            if(isDead) return;
            isPaused = !isPaused;
            const overlay = document.getElementById('overlay');
            overlay.style.display = isPaused ? 'flex' : 'none';
            document.getElementById('overlay-title').textContent = "PAUSA";
            document.getElementById('btn-resume').style.display = 'flex';
            
            if(isPaused) {
                audio.pause();
                activeNotes.forEach(n => n.el.style.animationPlayState = 'paused');
            } else {
                audio.play();
                activeNotes.forEach(n => n.el.style.animationPlayState = 'running');
                renderLoop();
            }
        }

        function finish(msg) {
            isDead = true;
            gameActive = false;
            audio.pause();
            const overlay = document.getElementById('overlay');
            overlay.style.display = 'flex';
            document.getElementById('overlay-title').textContent = msg;
            document.getElementById('btn-resume').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
