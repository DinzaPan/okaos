<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKAOs - Play</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        :root {
            --bg: #020205;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
            --k1: #ff4757;
            --k2: #3742fa;
            --k3: #2ed573;
            --k4: #eab000;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            width: 100vw;
            background: var(--bg);
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #intro-layer {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.5s;
        }

        .intro-hearts { display: flex; gap: 20px; margin-bottom: 30px; }
        .intro-heart {
            width: 60px;
            height: 60px;
            fill: #ff4757;
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .intro-text {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at center, #0a0a15 0%, #000 100%);
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .top-left-logo {
            position: absolute;
            top: 25px;
            left: 25px;
            font-size: 2rem;
            font-weight: 700;
            opacity: 0.8;
            z-index: 100;
        }

        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            z-index: 60;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 50;
        }

        .lives-container { display: flex; gap: 8px; }
        .life-heart { width: 30px; height: 30px; fill: #ff4757; transition: 0.3s; }

        .pause-trigger {
            width: 45px;
            height: 45px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .pause-trigger svg { width: 24px; height: 24px; fill: white; }

        .game-track {
            position: relative;
            width: 450px;
            height: 100%;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            background: rgba(255,255,255,0.01);
        }

        .hit-bar {
            position: absolute;
            bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 0 15px;
        }

        .slot {
            width: 75px;
            height: 75px;
            border: 3px solid var(--border);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.03);
            transition: all 0.05s;
        }

        #s0 { border-color: rgba(255, 71, 87, 0.3); }
        #s1 { border-color: rgba(55, 66, 250, 0.3); }
        #s2 { border-color: rgba(46, 213, 115, 0.3); }
        #s3 { border-color: rgba(234, 176, 0, 0.3); }

        #s0.pressed { background: var(--k1); box-shadow: 0 0 20px var(--k1); border-color: #fff; }
        #s1.pressed { background: var(--k2); box-shadow: 0 0 20px var(--k2); border-color: #fff; }
        #s2.pressed { background: var(--k3); box-shadow: 0 0 20px var(--k3); border-color: #fff; }
        #s3.pressed { background: var(--k4); box-shadow: 0 0 20px var(--k4); border-color: #fff; }

        .slot svg { width: 32px; height: 32px; fill: rgba(255,255,255,0.2); }

        .note {
            position: absolute;
            width: 65px;
            height: 65px;
            background: #fff;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
            z-index: 10;
        }

        .note svg { width: 35px; height: 35px; fill: #000; }

        #combo-ui {
            position: absolute;
            top: 30%;
            text-align: center;
            pointer-events: none;
        }

        #combo-text { font-size: 5rem; font-weight: 700; color: rgba(255,255,255,0.1); }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .overlay-card {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-item {
            padding: 20px;
            border-radius: 18px;
            background: var(--glass);
            border: 1px solid var(--border);
            color: #fff;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .nav-item:hover { background: #fff; color: #000; }
        .nav-item svg { width: 20px; height: 20px; fill: currentColor; }

        #settings-panel {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .settings-box {
            background: #111;
            padding: 40px;
            border-radius: 25px;
            border: 1px solid var(--border);
            width: 400px;
        }

        .setting-row { margin-bottom: 20px; }
        .setting-row label { display: block; color: #888; margin-bottom: 10px; font-size: 0.9rem; }

        .key-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .key-cap {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
        }
        .key-cap.active { border-color: #fff; background: rgba(255,255,255,0.2); }

        input[type="range"] { width: 100%; accent-color: #fff; }

        @keyframes noteFall {
            from { transform: translateY(-100px); }
            to { transform: translateY(110vh); }
        }
    </style>
</head>
<body>

    <audio id="audio-engine" src="music/puertas.mp3"></audio>

    <div id="intro-layer">
        <div class="intro-hearts">
            <svg id="ih1" class="intro-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <svg id="ih2" class="intro-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <svg id="ih3" class="intro-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </div>
        <div id="intro-msg" class="intro-text"></div>
    </div>

    <div id="game-canvas">
        <div class="top-left-logo">OKAOs</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <div class="top-bar">
            <div class="lives-container">
                <svg id="l0" class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg id="l1" class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg id="l2" class="life-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
            <div class="pause-trigger" onclick="togglePause()">
                <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
        </div>

        <div id="combo-ui"><div id="combo-text">0</div></div>

        <div class="game-track" id="track">
            <div class="hit-bar">
                <div class="slot" id="s0"><svg viewBox="0 0 24 24"><path d="M21 3L3 21M3 21H12M3 21V12" stroke="currentColor" stroke-width="2" fill="none"/></svg></div>
                <div class="slot" id="s1"><svg viewBox="0 0 24 24"><path d="M12 21L12 3M12 21L5 14M12 21L19 14" stroke="currentColor" stroke-width="2" fill="none"/></svg></div>
                <div class="slot" id="s2"><svg viewBox="0 0 24 24"><path d="M12 3L12 21M12 3L5 10M12 3L19 10" stroke="currentColor" stroke-width="2" fill="none"/></svg></div>
                <div class="slot" id="s3"><svg viewBox="0 0 24 24"><path d="M3 3L21 21M21 21H12M21 21V12" stroke="currentColor" stroke-width="2" fill="none"/></svg></div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <h1 id="overlay-title" style="margin-bottom: 30px; font-size: 3rem;">PAUSA</h1>
        <div class="overlay-card">
            <div class="nav-item" id="resume-btn" onclick="togglePause()">Continuar</div>
            <div class="nav-item" onclick="restartGame()">Reiniciar</div>
            <div class="nav-item" onclick="openSettings()">Ajustes</div>
            <div class="nav-item" onclick="exitGame()">Volver al Inicio</div>
        </div>
    </div>

    <div id="settings-panel">
        <div class="settings-box">
            <h2 style="margin-bottom: 20px;">Ajustes</h2>
            <div class="setting-row">
                <label>Volumen</label>
                <input type="range" id="vol-ctrl" min="0" max="1" step="0.1" value="1">
            </div>
            <div class="setting-row">
                <label>Teclas de Juego</label>
                <div class="key-grid">
                    <div class="key-cap" id="k0" onclick="remap(0)">A</div>
                    <div class="key-cap" id="k1" onclick="remap(1)">S</div>
                    <div class="key-cap" id="k2" onclick="remap(2)">K</div>
                    <div class="key-cap" id="k3" onclick="remap(3)">L</div>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="nav-item" style="flex:1; background: #fff; color: #000;" onclick="saveSettings()">Guardar</button>
                <button class="nav-item" style="flex:1;" onclick="closeSettings()">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio-engine');
        const canvas = document.getElementById('game-canvas');
        const overlay = document.getElementById('overlay');
        const track = document.getElementById('track');
        const comboEl = document.getElementById('combo-text');
        
        let combo = 0;
        let lives = 3;
        let isPaused = false;
        let isDead = false;
        let activeNotes = [];
        let keys = ['a', 's', 'k', 'l'];
        let audioCtx, analyzer, dataArray, source;
        let lastSpawn = 0;
        let remappingIdx = -1;

        const icons = [
            '<svg viewBox="0 0 24 24"><path d="M21 3L3 21M3 21H12M3 21V12" stroke="black" stroke-width="2" fill="none"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M12 21L12 3M12 21L5 14M12 21L19 14" stroke="black" stroke-width="2" fill="none"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M12 3L12 21M12 3L5 10M12 3L19 10" stroke="black" stroke-width="2" fill="none"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M3 3L21 21M21 21H12M21 21V12" stroke="black" stroke-width="2" fill="none"/></svg>'
        ];

        function init() {
            const savedKeys = localStorage.getItem('okao_keys');
            if(savedKeys) {
                keys = JSON.parse(savedKeys);
                keys.forEach((k, i) => document.getElementById(`k${i}`).textContent = k.toUpperCase());
            }
            const savedVol = localStorage.getItem('okao_vol');
            if(savedVol) {
                audio.volume = savedVol;
                document.getElementById('vol-ctrl').value = savedVol;
            }
            startSequence();
        }

        async function startSequence() {
            const h = [document.getElementById('ih1'), document.getElementById('ih2'), document.getElementById('ih3')];
            const msg = document.getElementById('intro-msg');
            const wait = ms => new Promise(r => setTimeout(r, ms));

            for(let i=0; i<3; i++) {
                h[i].style.opacity = '1'; h[i].style.transform = 'scale(1.2)';
                await wait(600);
            }
            
            h.forEach(el => el.style.opacity = '0');
            await wait(400);

            msg.textContent = "3 Vidas"; msg.style.opacity = '1'; await wait(800);
            msg.style.opacity = '0'; await wait(200);
            msg.textContent = "¿Listo?"; msg.style.opacity = '1'; await wait(800);
            msg.style.opacity = '0'; await wait(200);
            msg.textContent = "¡Go!"; msg.style.opacity = '1'; await wait(600);

            document.getElementById('intro-layer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-layer').style.display = 'none';
                canvas.style.display = 'flex';
                startGame();
            }, 500);
        }

        function startGame() {
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                source = audioCtx.createMediaElementSource(audio);
                analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 256;
                source.connect(analyzer);
                analyzer.connect(audioCtx.destination);
                dataArray = new Uint8Array(analyzer.frequencyBinCount);
            }
            audio.play();
            updateLoop();
        }

        function updateLoop() {
            if(isPaused || isDead) return;
            requestAnimationFrame(updateLoop);

            analyzer.getByteFrequencyData(dataArray);
            let energy = 0;
            for(let i=0; i<10; i++) energy += dataArray[i];
            energy /= 10;

            const now = Date.now();
            if(energy > 160 && now - lastSpawn > 280) {
                spawnNote(Math.floor(Math.random()*4));
                lastSpawn = now;
            }

            document.getElementById('progress-bar').style.width = (audio.currentTime / audio.duration * 100) + "%";
        }

        function spawnNote(lane) {
            const n = document.createElement('div');
            n.className = 'note';
            n.innerHTML = icons[lane];
            const slot = document.getElementById(`s${lane}`);
            n.style.left = slot.offsetLeft + "px";
            n.style.animation = "noteFall 2s linear forwards";
            track.appendChild(n);

            const obj = { el: n, lane, hit: false };
            activeNotes.push(obj);

            n.addEventListener('animationend', () => {
                if(!obj.hit && !isPaused) loseLife();
                n.remove();
                activeNotes = activeNotes.filter(x => x !== obj);
            });
        }

        function handleInput(lane) {
            const slot = document.getElementById(`s${lane}`);
            slot.classList.add('pressed');
            setTimeout(() => slot.classList.remove('pressed'), 100);

            const sRect = slot.getBoundingClientRect();
            const targetY = sRect.top + sRect.height/2;

            let hit = false;
            for(let n of activeNotes) {
                if(n.lane === lane && !n.hit) {
                    const nRect = n.el.getBoundingClientRect();
                    const nY = nRect.top + nRect.height/2;
                    if(Math.abs(nY - targetY) < 60) {
                        n.hit = true;
                        n.el.style.display = 'none';
                        combo++;
                        comboEl.textContent = combo;
                        hit = true;
                        break;
                    }
                }
            }
            if(!hit) {
                combo = 0;
                comboEl.textContent = "0";
            }
        }

        function loseLife() {
            lives--;
            for(let i=0; i<3; i++) {
                document.getElementById(`l${i}`).style.opacity = i < lives ? "1" : "0.1";
            }
            if(lives <= 0 && !isDead) gameOver();
        }

        function togglePause() {
            if(isDead) return;
            isPaused = !isPaused;
            if(isPaused) {
                audio.pause();
                overlay.style.display = 'flex';
                document.getElementById('overlay-title').textContent = "PAUSA";
                document.getElementById('resume-btn').style.display = 'flex';
                document.querySelectorAll('.note').forEach(n => n.style.animationPlayState = 'paused');
            } else {
                audio.play();
                overlay.style.display = 'none';
                document.querySelectorAll('.note').forEach(n => n.style.animationPlayState = 'running');
                updateLoop();
            }
        }

        function gameOver() {
            isDead = true;
            audio.pause();
            overlay.style.display = 'flex';
            document.getElementById('overlay-title').textContent = "GAME OVER";
            document.getElementById('resume-btn').style.display = 'none';
        }

        function restartGame() {
            location.reload();
        }

        function exitGame() {
            document.body.style.opacity = '0';
            setTimeout(() => location.href = 'index.html', 500);
        }

        function openSettings() { document.getElementById('settings-panel').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-panel').style.display = 'none'; remappingIdx = -1; }
        
        function remap(i) {
            remappingIdx = i;
            document.querySelectorAll('.key-cap').forEach(c => c.classList.remove('active'));
            document.getElementById(`k${i}`).classList.add('active');
            document.getElementById(`k${i}`).textContent = "...";
        }

        function saveSettings() {
            const vol = document.getElementById('vol-ctrl').value;
            audio.volume = vol;
            localStorage.setItem('okao_vol', vol);
            localStorage.setItem('okao_keys', JSON.stringify(keys));
            closeSettings();
        }

        window.addEventListener('keydown', (e) => {
            if(remappingIdx !== -1) {
                keys[remappingIdx] = e.key.toLowerCase();
                document.getElementById(`k${remappingIdx}`).textContent = e.key.toUpperCase();
                document.getElementById(`k${remappingIdx}`).classList.remove('active');
                remappingIdx = -1;
                return;
            }
            if(e.key === 'Escape') togglePause();
            const idx = keys.indexOf(e.key.toLowerCase());
            if(idx !== -1 && !isPaused && !isDead) handleInput(idx);
        });

        init();
    </script>
</body>
</html>
